<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>ဆက်သွယ်ရန် | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    :root {
      --primary: #00ffe7;
      --secondary: #3b82f6;
      --bg: #0a0f1e;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, var(--bg), #020408);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      position: relative;
    }
    .particle { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle span { position: absolute; width: 3px; height: 3px; background: rgba(0, 255, 231, 0.4); border-radius: 50%; animation: floatParticle 10s infinite linear; }
    @keyframes floatParticle { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-20vh) scale(1); opacity: 0; } }
    .glow-orb { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,255,231,0.1), transparent); border-radius: 50%; filter: blur(60px); pointer-events: none; z-index: 0; animation: floatOrb 14s infinite alternate; }
    .glow-orb:nth-child(2) { bottom: 0; right: 0; background: radial-gradient(circle, rgba(59,130,246,0.12), transparent); animation-duration: 18s; }
    @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 30px) scale(1.2); } }
    
    .back-btn { position: fixed; top: 20px; left: 20px; z-index: 20; background: var(--glass); backdrop-filter: blur(8px); border: 1px solid rgba(0, 255, 231, 0.4); border-radius: 40px; padding: 10px 22px; font-weight: bold; color: var(--primary); cursor: pointer; font-size: 14px; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
    .back-btn:hover { background: var(--primary); color: black; transform: translateX(-3px); box-shadow: 0 0 15px rgba(0,255,231,0.5); }
    
    .header { position: relative; z-index: 10; text-align: center; margin-bottom: 40px; }
    .header .icon { font-size: 4rem; filter: drop-shadow(0 0 15px rgba(0,255,231,0.5)); animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .header h1 { font-size: 2rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; color: transparent; margin-top: 10px; }
    .header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 8px; }
    
    .contact-container { position: relative; z-index: 10; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    
    .contact-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 18px 22px;      display: flex; align-items: center; gap: 18px;
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
    }
    .contact-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: var(--primary);
      background: rgba(0, 255, 231, 0.08);
      box-shadow: 0 15px 30px rgba(0, 255, 231, 0.15);
    }
    .card-icon {
      width: 55px; height: 55px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .card-icon img {
      width: 65%; height: 65%;
      object-fit: contain;
      transition: transform 0.3s;
    }
    .contact-card:hover .card-icon {
      background: white;
      transform: scale(1.05);
    }
    .contact-card:hover .card-icon img {
      transform: scale(1.1);
    }
    .card-info { flex: 1; }
    .card-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
    .card-info p { font-size: 0.75rem; color: var(--text-muted); }
    .card-arrow { font-size: 22px; color: var(--primary); transition: transform 0.2s; }
    .contact-card:hover .card-arrow { transform: translateX(5px); }
    
    .copy-card {
      background: linear-gradient(135deg, rgba(0,255,231,0.12), rgba(59,130,246,0.08));
      border-color: var(--primary);
    }
    .copy-btn {
      background: rgba(0,255,231,0.2);
      border: none; border-radius: 30px;
      padding: 6px 16px; font-size: 12px;
      color: var(--primary); cursor: pointer;
      transition: all 0.2s;    }
    .copy-btn:hover { background: var(--primary); color: black; }
    
    .note {
      position: relative; z-index: 10;
      text-align: center; margin-top: 40px;
      padding: 15px;
      background: rgba(0, 255, 231, 0.05);
      border-radius: 20px;
      font-size: 0.75rem; color: var(--text-muted);
      border: 1px solid rgba(0,255,231,0.2);
      max-width: 500px; margin-left: auto; margin-right: auto;
    }
    .note span { color: var(--primary); }
    
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95); backdrop-filter: blur(8px);
      color: white; padding: 12px 24px; border-radius: 50px;
      font-size: 0.85rem; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 1000;
      white-space: nowrap; border: 1px solid var(--primary);
    }
    .toast.show { opacity: 1; }
    
    @media (max-width: 550px) {
      body { padding: 15px; padding-top: 70px; }
      .header h1 { font-size: 1.5rem; }
      .header .icon { font-size: 3rem; }
      .contact-card { padding: 14px 18px; gap: 14px; }
      .card-icon { width: 48px; height: 48px; }
      .card-info h3 { font-size: 0.95rem; }
      .toast { white-space: normal; text-align: center; max-width: 90%; }
    }
  </style>
</head>

<script>
  // 🔑 Supabase Config
  const SUPABASE_URL = 'https://ibrdrdumqqcskxfbmect.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlicmRyZHVtcXFjc2t4ZmJtZWN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTAxMDgsImV4cCI6MjA5NTQ2NjEwOH0.r1UB_IL7J9AxIDhwO9uXxn2EdQW4lReCrPk6JlTh0cE';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const uidDisplay = document.getElementById('uidDisplay');
  const toast = document.getElementById('toast');
  let currentUID = null;

  // 🔔 Toast Notification
  function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 2000);
  }

  // 📋 Copy UID
  window.copyUID = () => {
    if (currentUID) {
      navigator.clipboard.writeText(currentUID);
      showToast("✅ User ID (UID) ကို ကူးယူပြီးပါပြီ!");
    } else {
      showToast("❌ အကောင့်မဝင်ရသေးပါ");
    }
  };

  // 🎨 Create Particles
  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }  createParticles();

  // 🔙 Go Back
  window.goBack = () => { window.location.href = "index.html"; };

  // 🔐 Auth Check
  async function checkAuth() {
    const {  { user } } = await supabase.auth.getUser();
    if (user) {
      currentUID = user.id;
      // Show short UID (first 12 chars)
      uidDisplay.innerHTML = `${user.id.substring(0, 12)}...`;
    } else {
      uidDisplay.innerHTML = "အကောင့်မဝင်ရသေး";
    }
  }

  // 🚀 Initialize
  document.addEventListener('DOMContentLoaded', checkAuth);
</script>
