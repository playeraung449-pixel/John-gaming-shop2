<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>ဆက်သွယ်ရန် | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      position: relative;
    }

    /* Animated particles */
    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    /* Glowing orbs */
    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    /* Header */
    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 40px;
    }
    .header .icon {
      font-size: 4rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 10px;
    }
    .header p {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    /* Contact Container */
    .contact-container {
      position: relative;
      z-index: 10;
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Contact Card */
    .contact-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
      border: 1px solid rgba(0, 255, 231, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: white;
    }
    .contact-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: #00ffe7;
      background: rgba(0, 255, 231, 0.08);
      box-shadow: 0 15px 30px rgba(0, 255, 231, 0.15);
    }
    .card-icon {
      width: 55px;
      height: 55px;
      background: rgba(0, 255, 231, 0.15);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: all 0.3s;
    }
    .contact-card:hover .card-icon {
      background: #00ffe7;
      transform: scale(1.05);
    }
    .contact-card:hover .card-icon .emoji {
      filter: brightness(0);
    }
    .card-info {
      flex: 1;
    }
    .card-info h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .card-info p {
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .card-arrow {
      font-size: 22px;
      color: #00ffe7;
      transition: transform 0.2s;
    }
    .contact-card:hover .card-arrow {
      transform: translateX(5px);
    }

    /* Special Card for Copy */
    .copy-card {
      background: linear-gradient(135deg, rgba(0,255,231,0.12), rgba(59,130,246,0.08));
      border-color: #00ffe7;
    }
    .copy-btn {
      background: rgba(0,255,231,0.2);
      border: none;
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 12px;
      color: #00ffe7;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: #00ffe7;
      color: black;
    }

    /* Note */
    .note {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-top: 40px;
      padding: 15px;
      background: rgba(0, 255, 231, 0.05);
      border-radius: 20px;
      font-size: 0.75rem;
      color: #64748b;
      border: 1px solid rgba(0,255,231,0.2);
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .note span {
      color: #00ffe7;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .header h1 {
        font-size: 1.5rem;
      }
      .header .icon {
        font-size: 3rem;
      }
      .contact-card {
        padding: 14px 18px;
        gap: 14px;
      }
      .card-icon {
        width: 48px;
        height: 48px;
        font-size: 24px;
      }
      .card-info h3 {
        font-size: 0.95rem;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">📞</div>
  <h1>ဆက်သွယ်ရန်</h1>
  <p>Owner နှင့် တိုက်ရိုက်ဆက်သွယ်ရန် အောက်ပါလမ်းကြောင်းများ</p>
</div>

<div class="contact-container">
  
  <!-- TikTok -->
  <a class="contact-card" href="https://www.tiktok.com/@johnny_azm?_t=ZS-90rjX4DVQhN&_r=1" target="_blank">
    <div class="card-icon">
      <span class="emoji">🎵</span>
    </div>
    <div class="card-info">
      <h3>TikTok</h3>
      <p>@johnny_mmk</p>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <!-- Telegram -->
  <a class="contact-card" href="https://t.me/Johnny_AZM" target="_blank">
    <div class="card-icon">
      <span class="emoji">✈️</span>
    </div>
    <div class="card-info">
      <h3>Telegram</h3>
      <p>@Johnny_AZM</p>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <!-- Facebook -->
  <a class="contact-card" href="https://facebook.com/jucksuki" target="_blank">
    <div class="card-icon">
      <span class="emoji">📘</span>
    </div>
    <div class="card-info">
      <h3>Facebook</h3>
      <p>@jucksuki</p>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <!-- Copy Phone/UUID Card (Optional) -->
  <div class="contact-card copy-card" id="copyCard">
    <div class="card-icon">
      <span class="emoji">📋</span>
    </div>
    <div class="card-info">
      <h3>User ID (UID)</h3>
      <p id="uidDisplay">အကောင့်မဝင်ရသေး</p>
    </div>
    <button class="copy-btn" id="copyUidBtn" onclick="copyUID()">Copy</button>
  </div>
</div>

<div class="note">
  💡 <span>မှတ်ချက်</span> - လူမှုကွန်ရက်လင့်ခ်များကို နှိပ်၍ တိုက်ရိုက်ဆက်သွယ်နိုင်ပါသည်။
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const uidDisplay = document.getElementById('uidDisplay');
  const toast = document.getElementById('toast');
  let currentUID = null;

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
    }, 2000);
  }

  window.copyUID = () => {
    if (currentUID) {
      navigator.clipboard.writeText(currentUID);
      showToast("✅ User ID (UID) ကို ကူးယူပြီးပါပြီ!");
    } else {
      showToast("❌ အကောင့်မဝင်ရသေးပါ");
    }
  };

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => {
    window.location.href = "index.html";
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUID = user.uid;
      uidDisplay.innerHTML = `${user.uid.substring(0, 12)}...`;
    } else {
      uidDisplay.innerHTML = "အကောင့်မဝင်ရသေး";
    }
  });
</script>

</body>
</html>
