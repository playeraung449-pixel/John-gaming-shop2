  // 📤 Send Message Function
  async function sendMessage() {    const message = messageInput.value.trim();
    if (!message) return;
    
    sendBtn.disabled = true;
    
    // Add user message
    addMessage(message, 'user', true);
    messageInput.value = '';
    
    // Show typing indicator
    showTypingIndicator();
    
    // Simulate AI thinking delay
    setTimeout(async () => {
      const response = await getAIResponse(message);
      hideTypingIndicator();
      addMessage(response, 'ai', false);
      sendBtn.disabled = false;
      messageInput.focus();
    }, 800);
  }

  // 🎯 Quick Reply Handler
  window.sendQuickReply = (text) => {
    messageInput.value = text;
    sendMessage();
  };

  // ⌨️ Enter Key Handler
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !sendBtn.disabled) {
      sendMessage();
    }
  });

  // 🔙 Go Back
  window.goBack = () => { window.location.href = "index.html"; };

  // 🔐 Auth Check
  async function checkAuth() {
    const {  { user } } = await supabase.auth.getUser();
    if (!user) {
      showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်");
      setTimeout(() => { window.location.href = "login.html"; }, 1500);
    }
  }

  // 🚀 Initialize
  document.addEventListener('DOMContentLoaded', () => {
    checkAuth();    setTimeout(() => { welcomeGlow.style.display = 'none'; }, 3000);
  });
