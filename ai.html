<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AI Chat Assistant | John Gaming Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    /* Header */
    .chat-header {
      position: relative;
      z-index: 20;
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(15px);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid rgba(0, 255, 231, 0.3);
    }
    .back-btn {
      background: rgba(0, 255, 231, 0.15);
      border: 1px solid #00ffe7;
      border-radius: 40px;
      padding: 8px 18px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
    }
    .ai-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .ai-avatar {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,231,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(0,255,231,0); }
    }
    .ai-details h3 {
      font-size: 1rem;
      margin-bottom: 2px;
    }
    .ai-details p {
      font-size: 0.7rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .online-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      display: inline-block;
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Messages Container */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* Message Bubbles */
    .message {
      display: flex;
      animation: fadeSlideUp 0.3s ease;
    }
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message.user {
      justify-content: flex-end;
    }
    .message.ai {
      justify-content: flex-start;
    }
    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .message.user .bubble {
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      color: black;
      border-bottom-right-radius: 4px;
    }
    .message.ai .bubble {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.2);
      color: white;
      border-bottom-left-radius: 4px;
    }
    .message-time {
      font-size: 0.6rem;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }

    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 25px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #00ffe7;
      border-radius: 50%;
      animation: typingAnim 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingAnim {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* Quick Replies */
    .quick-replies {
      position: relative;
      z-index: 10;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      background: rgba(10, 20, 35, 0.5);
      border-top: 1px solid rgba(0,255,231,0.1);
    }
    .quick-replies::-webkit-scrollbar {
      display: none;
    }
    .quick-btn {
      background: rgba(0, 255, 231, 0.1);
      border: 1px solid rgba(0, 255, 231, 0.3);
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 0.75rem;
      color: #00ffe7;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .quick-btn:hover {
      background: #00ffe7;
      color: black;
    }

    /* Input Area */
    .input-area {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(15px);
      padding: 15px 20px;
      display: flex;
      gap: 12px;
      border-top: 1px solid rgba(0, 255, 231, 0.3);
    }
    .input-area input {
      flex: 1;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(0,255,231,0.3);
      border-radius: 30px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .input-area input:focus {
      border-color: #00ffe7;
      box-shadow: 0 0 10px rgba(0,255,231,0.3);
    }
    .input-area input::placeholder {
      color: #64748b;
    }
    .send-btn {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      border: none;
      border-radius: 40px;
      padding: 0 25px;
      font-weight: bold;
      color: black;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .send-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(0,255,231,0.4);
    }
    .send-btn:disabled {
      opacity: 0.5;
      transform: none;
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1100;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }

    @media (max-width: 550px) {
      .bubble {
        max-width: 90%;
        font-size: 13px;
        padding: 10px 14px;
      }
      .send-btn {
        padding: 0 18px;
      }
      .quick-replies {
        padding: 8px 15px;
      }
      .quick-btn {
        padding: 6px 12px;
        font-size: 0.7rem;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
        bottom: 90px;
      }
    }
  </style>
</head>

      container.appendChild(span);
    }
  }
  createParticles();

  function scrollToBottom() {

  function formatTime() {

  function addMessage(text, sender, isUser = false) {

    else if (msg.includes('spin') || msg.includes('ဘီး') || msg.includes('ဆုလာဘ်')) {

    }
    
    // Starlight Card
    else if (msg.includes('starlight') || msg.includes('ကဒ်')) {
      return `✨ **Starlight Card အကြောင်း** ✨

💡 အသေးစိတ်သိရှိရန် Admin ကိုဆက်သွယ်ပါ။`;
    }
    
    // Contact Admin
    else if (msg.includes('admin') || msg.includes('ဆက်သွယ်') || msg.includes('အကူအညီ')) {
      return `👑 **Admin သို့ဆက်သွယ်ရန်** 👑

• ပင်မစာမျက်နှာ Menu → "Admin နဲ့ဆက်သွယ်ရန်"

  async function sendMessage() {
    const message = messageInput.value.trim();
    if (!message) return;
    
    sendBtn.disabled = true;
    
    addMessage(message, 'user', true);
    messageInput.value = '';
    
    showTypingIndicator();
    
    setTimeout(async () => {
      const response = await getAIResponse(message);
      hideTypingIndicator();
      addMessage(response, 'ai', false);
      sendBtn.disabled = false;
    }, 800);
  }

  window.sendMessage = sendMessage;
  
  window.sendQuickReply = (text) => {
    messageInput.value = text;
    sendMessage();
  };

  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !sendBtn.disabled) {
      sendMessage();
    }
  });

  window.goBack = () => {
    window.location.href = "home.html";
  };

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်");
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    }
  });
</script>
