<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard | John Gaming Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            padding-bottom: 85px;
        }

        /* Animated particles */
        .particle {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle span {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(0, 255, 231, 0.4);
            border-radius: 50%;
            animation: floatParticle 10s infinite linear;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }

        /* Header */
        .header {
            position: relative;
            z-index: 20;
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 255, 231, 0.3);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #00ffe7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .menu-icon {
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .menu-icon:hover {
            transform: scale(1.1);
        }

        /* User ID Card */
        .user-id-card {
            position: relative;
            z-index: 10;
            background: rgba(0, 255, 231, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px 18px;
            margin: 15px 20px 0 20px;
            border: 1px solid rgba(0, 255, 231, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .user-avatar {
            font-size: 2rem;
        }
        .user-details {
            flex: 1;
        }
        .user-name {
            font-weight: bold;
            font-size: 1rem;
            color: #00ffe7;
        }
        .user-uid {
            font-size: 0.7rem;
            color: #94a3b8;
            word-break: break-all;
            font-family: monospace;
        }
        .copy-btn {
            background: rgba(59, 130, 246, 0.3);
            border: 1px solid #3b82f6;
            border-radius: 30px;
            padding: 6px 15px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .copy-btn:hover {
            background: #3b82f6;
            transform: scale(1.02);
        }

        /* Sidebar Menu */
        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: rgba(10, 20, 35, 0.98);
            backdrop-filter: blur(20px);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 80px 15px 20px;
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
            border-left: 1px solid rgba(0,255,231,0.3);
            overflow-y: auto;
        }
        .sidebar.open {
            right: 0;
        }
        .sidebar button {
            width: 100%;
            padding: 12px 15px;
            margin: 6px 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,255,231,0.2);
            border-radius: 30px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar button:hover {
            background: linear-gradient(90deg, #00ffe7, #3b82f6);
            color: black;
            transform: translateX(-5px);
        }
        .sidebar button span:first-child {
            font-size: 1.2rem;
        }
        .close-sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #00ffe7;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 99;
            display: none;
        }
        .overlay.show {
            display: block;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .welcome-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(0,255,231,0.2);
            animation: fadeInDown 0.5s ease;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-card h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .welcome-card p {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(0,255,231,0.15), rgba(59,130,246,0.1));
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(0,255,231,0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .balance-card:hover {
            transform: scale(1.02);
        }
        .balance-label {
            font-size: 0.9rem;
            color: #94a3b8;
            letter-spacing: 1px;
        }
        .balance-amount {
            font-size: 2.2rem;
            font-weight: bold;
            color: #00ffe7;
            text-shadow: 0 0 10px rgba(0,255,231,0.5);
        }

        /* Button Grid */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .action-btn {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 15px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .action-btn:hover {
            background: linear-gradient(90deg, #00ffe7, #3b82f6);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,255,231,0.3);
        }
        .action-btn:hover .btn-title {
            color: black;
        }
        .action-btn .btn-icon {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .action-btn .btn-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
        }

        /* Bottom Navigation with Center AI Button */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 20, 35, 0.98);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 15px;
            border-top: 1px solid rgba(0,255,231,0.3);
            z-index: 15;
        }
        .nav-item {
            background: transparent;
            border: none;
            color: #94a3b8;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 6px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            flex: 1;
        }
        .nav-item:hover {
            color: #00ffe7;
            transform: translateY(-3px);
        }
        .nav-item.active {
            color: #00ffe7;
        }
        .nav-item span {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 3px;
        }

        /* Center AI Circle Button */
        .ai-center-btn {
            position: relative;
            bottom: 15px;
            background: linear-gradient(135deg, #00ffe7, #3b82f6);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,255,231,0.5);
            margin: 0 5px;
            flex-shrink: 0;
        }
        .ai-center-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0,255,231,0.8);
        }
        .ai-center-btn span {
            font-size: 1.8rem;
            color: black;
        }

        /* Loading skeleton */
        .skeleton {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .toast {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap;
            border: 1px solid #00ffe7;
        }
        .toast.show {
            opacity: 1;
        }

        @media (max-width: 550px) {
            .btn-grid {
                gap: 10px;
            }
            .action-btn {
                padding: 12px 6px;
            }
            .balance-amount {
                font-size: 1.6rem;
            }
            .toast {
                white-space: normal;
                text-align: center;
                max-width: 90%;
                bottom: 90px;
            }
            .user-id-card {
                margin: 10px 15px 0 15px;
                padding: 10px 12px;
            }
            .user-name {
                font-size: 0.85rem;
            }
            .ai-center-btn {
                width: 55px;
                height: 55px;
                bottom: 12px;
            }
            .ai-center-btn span {
                font-size: 1.5rem;
            }
            .nav-item {
                font-size: 0.6rem;
                padding: 4px 6px;
            }
            .nav-item span {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="particle" id="particles"></div>

<!-- Header -->
<div class="header">
    <h1>🎮 John Gaming Shop</h1>
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
</div>

<!-- User ID Card -->
<div class="user-id-card" id="userCard" style="display: none;">
    <div class="user-info">
        <div class="user-avatar">👤</div>
        <div class="user-details">
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-uid" id="userUID">UID: ...</div>
        </div>
    </div>
    <button class="copy-btn" onclick="copyUID()">📋 Copy UID</button>
</div>

<!-- Sidebar -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div class="close-sidebar" onclick="toggleSidebar()">✕</div>
    <button onclick="goTo('main.html')">
        <span>📢</span> အသိပေးချက်များ
    </button>
    <button onclick="goTo('ai.html')">
        <span>🤖</span> AI Chat
    </button>
    <button onclick="goTo('payment.html')">
        <span>💰</span> ငွေဖြည့်ရန်
    </button>
    <button onclick="goTo('change.html')">
        <span>🔐</span> Password Change
    </button>
    <button onclick="goTo('use.html')">
        <span>📖</span> အသုံးပြုပုံ
    </button>
    <button onclick="goTo('owner.html')">
        <span>👑</span> Admin နဲ့ဆက်သွယ်ရန်
    </button>
    <button onclick="logout()">
        <span>🚪</span> Logout
    </button>
</div>

<!-- Main Content -->
<div class="container" id="mainContent">
    <!-- Skeleton loading -->
    <div class="skeleton" id="skeleton"></div>
    <div class="skeleton" id="skeleton2"></div>
    
    <!-- Real content (hidden initially) -->
    <div id="realContent" style="display: none;">
        <div class="welcome-card">
            <h2 id="welcome">မင်္ဂလာပါ 👋</h2>
            <p>ဂိမ်းလောကမှ ကြိုဆိုပါတယ်</p>
        </div>

        <div class="balance-card">
            <div class="balance-label">💎 ငွေလက်ကျန် 💎</div>
            <div class="balance-amount" id="balance">0 Ks</div>
        </div>

        <div class="btn-grid">
            <div class="action-btn" onclick="goTo('game.html')">
                <div class="btn-icon">🎮</div>
                <div class="btn-title">ဂိမ်းများ</div>
            </div>
            <div class="action-btn" onclick="goTo('Top.html')">
                <div class="btn-icon">🏆</div>
                <div class="btn-title">TOP BUYER</div>
            </div>
            <div class="action-btn" onclick="goTo('spin.html')">
                <div class="btn-icon">🎰</div>
                <div class="btn-title">Spin Wheel</div>
            </div>
            <div class="action-btn" onclick="goTo('other.html')">
                <div class="btn-icon">✨</div>
                <div class="btn-title">အခြား ဝန်ဆောင်မှု</div>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Navigation with Center AI Button -->
<div class="bottom-nav">
    <div class="nav-item" onclick="goTo('payment.html')">
        <span>💰</span> ငွေဖြည့်
    </div>
    <div class="nav-item" onclick="goTo('messages.html')">
        <span>💬</span> မက်ဆေ့ခ်ျ
    </div>
    
    <!-- AI Center Circle Button -->
    <div class="ai-center-btn" onclick="goTo('ai.html')">
        <span>🤖</span>
    </div>
    
    <div class="nav-item" onclick="goTo('history.html')">
        <span>📜</span> မှတ်တမ်း
    </div>
    <div class="nav-item" onclick="goTo('Acc.html')">
        <span>🔄</span> Acc ရောင်းဝယ်
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
        authDomain: "john-gaming-shop.firebaseapp.com",
        projectId: "john-gaming-shop",
        storageBucket: "john-gaming-shop.firebasestorage.app",
        messagingSenderId: "40810672889",
        appId: "1:40810672889:web:5661a8db077037b346e828",
        measurementId: "G-M8PLKW0P8L"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUID = null;
    let currentUserEmail = null;

    const toast = document.getElementById('toast');
    const skeleton = document.getElementById('skeleton');
    const skeleton2 = document.getElementById('skeleton2');
    const realContent = document.getElementById('realContent');
    const welcomeSpan = document.getElementById('welcome');
    const balanceSpan = document.getElementById('balance');
    const userCard = document.getElementById('userCard');
    const userNameSpan = document.getElementById('userName');
    const userUIDSpan = document.getElementById('userUID');

    function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // Copy UID function (global for onclick)
    window.copyUID = () => {
        if (currentUID) {
            navigator.clipboard.writeText(currentUID);
            showToast("✅ UID ကို ကူးယူပြီးပါပြီ!");
        } else {
            showToast("❌ UID မရှိသေးပါ");
        }
    };

    // Create particles
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const span = document.createElement('span');
            const size = Math.random() * 4 + 1;
            span.style.width = `${size}px`;
            span.style.height = `${size}px`;
            span.style.left = `${Math.random() * 100}%`;
            span.style.animationDelay = `${Math.random() * 10}s`;
            span.style.animationDuration = `${Math.random() * 6 + 6}s`;
            container.appendChild(span);
        }
    }
    createParticles();

    window.toggleSidebar = () => {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    };

    window.goTo = (page) => {
        window.location.href = page;
    };

    window.logout = async () => {
        try {
            await signOut(auth);
            showToast("✅ အကောင့်မှ ထွက်ပြီးပါပြီ");
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1000);
        } catch (error) {
            showToast("Logout error: " + error.message);
        }
    };

    // Load user data
    async function loadUserData(uid) {
        try {
            const userDoc = await getDoc(doc(db, "users", uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                welcomeSpan.innerText = `မင်္ဂလာပါ ${data.name || 'User'} 👋`;
                balanceSpan.innerText = `${data.balance || 0} Ks`;
                userNameSpan.innerText = data.name || 'User';
            } else {
                welcomeSpan.innerText = "မင်္ဂလာပါ User 👋";
                balanceSpan.innerText = "0 Ks";
                userNameSpan.innerText = 'User';
            }
            userUIDSpan.innerText = `UID: ${uid.substring(0, 12)}...`;
        } catch (error) {
            console.error("Error loading user:", error);
            welcomeSpan.innerText = "မင်္ဂလာပါ 👋";
            balanceSpan.innerText = "0 Ks";
            userNameSpan.innerText = 'User';
            userUIDSpan.innerText = `UID: ${uid.substring(0, 12)}...`;
        }
    }

    // Real-time balance listener
    function listenBalance(uid) {
        const userRef = doc(db, "users", uid);
        onSnapshot(userRef, (docSnap) => {
            if (docSnap.exists()) {
                const balance = docSnap.data().balance || 0;
                balanceSpan.innerText = `${balance} Ks`;
            }
        }, (error) => {
            console.error("Balance listener error:", error);
        });
    }

    // Auth state
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            currentUserEmail = user.email;
            
            // Show user card
            userCard.style.display = 'flex';
            
            // Hide skeletons, show real content
            skeleton.style.display = 'none';
            skeleton2.style.display = 'none';
            realContent.style.display = 'block';
            
            loadUserData(user.uid);
            listenBalance(user.uid);
        } else {
            window.location.href = "login.html";
        }
    });
</script>

</body>
</html>
