<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>PUBG UC Buy | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      padding-bottom: 40px;
      position: relative;
    }

    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 20px;
    }
    .header .icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
    }
    .header p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 5px;
    }

    .balance-card {
      position: relative;
      z-index: 10;
      background: rgba(0, 255, 231, 0.1);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 12px 20px;
      max-width: 280px;
      margin: 0 auto 20px auto;
      text-align: center;
      border: 1px solid rgba(0,255,231,0.3);
    }
    .balance-label {
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .balance-amount {
      font-size: 1.5rem;
      font-weight: bold;
      color: #00ffe7;
    }

    .uc-grid {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .uc-btn {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 231, 0.2);
      border-radius: 28px;
      padding: 14px 8px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
      text-align: center;
    }
    .uc-btn:hover {
      transform: translateY(-5px);
      border-color: #00ffe7;
      background: rgba(0, 255, 231, 0.1);
      box-shadow: 0 10px 20px rgba(0,255,231,0.15);
    }
    .uc-amount {
      font-size: 1rem;
      color: #00ffe7;
    }
    .uc-price {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 5px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: rgba(15, 25, 45, 0.98);
      border-radius: 32px;
      padding: 28px;
      width: 90%;
      max-width: 380px;
      border: 1px solid #00ffe7;
      animation: fadeScale 0.3s ease;
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-content h3 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      text-align: center;
      color: #00ffe7;
    }
    .modal-content p {
      margin: 8px 0;
      font-size: 0.9rem;
    }
    .modal-content input {
      width: 100%;
      padding: 12px 15px;
      margin: 12px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(0,255,231,0.3);
      border-radius: 30px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    .modal-content input:focus {
      border-color: #00ffe7;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn.buy {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      color: black;
    }
    .modal-btn.close {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .modal-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1100;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.error {
      border-color: #ef4444;
      background: rgba(220,38,38,0.9);
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .uc-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">🎮</div>
  <h1>PUBG UC ဝယ်ယူရန်</h1>
  <p>Unknown Cash များကို စျေးသက်သာစွာ ဝယ်ယူပါ</p>
</div>

<div class="balance-card">
  <div class="balance-label">💰 ငွေလက်ကျန်</div>
  <div class="balance-amount" id="balance">0 Ks</div>
</div>

<div class="uc-grid" id="ucGrid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>🎮 PUBG UC</h3>
    <p id="modalUC">UC: -</p>
    <p id="modalPrice">ကျသင့်ငွေ: -</p>
    <p id="modalBalance">လက်ကျန်ငွေ: -</p>
    <input type="text" id="gameId" placeholder="PUBG User ID (အိုင်ဒီထည့်ပါ)" autocomplete="off">
    <div class="modal-buttons">
      <button class="modal-btn close" onclick="closeModal()">ပိတ်မယ်</button>
      <button class="modal-btn buy" id="buyBtn" onclick="buyUC()">ဝယ်ယူမည်</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, get, update, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const TELEGRAM_BOT_TOKEN = "8653967411:AAFfw-0pR8RysuPD6aoSlZ7w7d8XNNs8l_A";
  const TELEGRAM_CHAT_ID = "6427719618";

  const ucList = [
    { uc: "60 UC", price: 3900 },
    { uc: "120 UC", price: 7700 },
    { uc: "180 UC", price: 11600 },
    { uc: "325 UC", price: 20900 },
    { uc: "385 UC", price: 24800 },
    { uc: "445 UC", price: 28600 },
    { uc: "660 UC", price: 42900 },
    { uc: "875 UC", price: 57000 },
    { uc: "1075 UC", price: 77600 },
    { uc: "1350 UC", price: 97000 },
    { uc: "1630 UC", price: 117000 },
    { uc: "2010 UC", price: 143000 },
    { uc: "2475 UC", price: 176000 },
    { uc: "2785 UC", price: 198000 },
    { uc: "3250 UC", price: 231000 },
    { uc: "3850 UC", price: 273000 },
    { uc: "6480 UC", price: 450000 },
    { uc: "12900 UC", price: 890000 },
    { uc: "32400 UC", price: 2200000 }
  ];

  let currentUser = null;
  let currentBalance = 0;
  let selectedUC = "";
  let selectedPrice = 0;
  let currentOrderId = null;

  const toast = document.getElementById('toast');
  const modal = document.getElementById('modal');
  const balanceSpan = document.getElementById('balance');
  const modalUC = document.getElementById('modalUC');
  const modalPrice = document.getElementById('modalPrice');
  const modalBalance = document.getElementById('modalBalance');
  const buyBtn = document.getElementById('buyBtn');
  const ucGrid = document.getElementById('ucGrid');
  const gameIdInput = document.getElementById('gameId');

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = isError ? 'toast error show' : 'toast show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => {
    window.location.href = "game.html";
  };

  async function sendTelegramNotification(userName, userId, uc, price, gameId, orderId) {
    const message = `🎮 PUBG UC အသစ်ဝယ်ယူမှု 🎮\n\n━━━━━━━━━━━━━━━━━━━━\n👤 အမည်: ${userName}\n🆔 User ID: ${userId}\n🎮 PUBG ID: ${gameId}\n💎 UC အရေအတွက်: ${uc}\n💰 ကျသင့်ငွေ: ${price.toLocaleString()} MMK\n📋 Order ID: ${orderId}\n📌 Status: ဆိုင်းငံ့ (Pending)\n━━━━━━━━━━━━━━━━━━━━\n⏰ ဝယ်ယူချိန်: ${new Date().toLocaleString()}\n\n✅ ကျေးဇူးတင်ပါသည်။ Admin အတည်ပြုချက်ကို စောင့်ဆိုင်းပါ။`;
    
    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    try {
      await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message,
          parse_mode: 'HTML'
        })
      });
    } catch (err) {
      console.error("Telegram error:", err);
    }
  }

  function renderUCButtons() {
    ucGrid.innerHTML = "";
    ucList.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "uc-btn";
      btn.innerHTML = `<div class="uc-amount">💎 ${item.uc}</div><div class="uc-price">${item.price.toLocaleString()} MMK</div>`;
      btn.onclick = () => showPurchase(item.uc, item.price);
      ucGrid.appendChild(btn);
    });
  }

  window.showPurchase = async (uc, price) => {
    if (!currentUser) {
      showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်", true);
      return;
    }
    selectedUC = uc;
    selectedPrice = price;
    gameIdInput.value = "";
    
    modalUC.innerText = `UC: ${uc}`;
    modalPrice.innerText = `ကျသင့်ငွေ: ${price.toLocaleString()} Ks`;
    modalBalance.innerText = `လက်ကျန်ငွေ: ${currentBalance.toLocaleString()} Ks`;
    modal.classList.add('show');
  };

  window.buyUC = async () => {
    if (!currentUser) return;
    
    const gameId = gameIdInput.value.trim();
    if (!gameId) {
      showToast("PUBG User ID ထည့်ပါ", true);
      return;
    }
    
    if (currentBalance < selectedPrice) {
      showToast("လက်ကျန်ငွေ မလုံလောက်ပါ", true);
      return;
    }
    
    buyBtn.disabled = true;
    buyBtn.innerText = "လုပ်ဆောင်နေသည်...";
    
    try {
      const userRef = ref(db, `users/${currentUser.uid}`);
      const newBalance = currentBalance - selectedPrice;
      await update(userRef, { balance: newBalance });
      
      const newOrderRef = push(ref(db, `orders/${currentUser.uid}`));
      currentOrderId = newOrderRef.key;
      
      const orderData = {
        type: "PUBG_UC",
        uc: selectedUC,
        price: selectedPrice,
        gameId: gameId,
        status: "pending",
        timestamp: Date.now(),
        date: new Date().toLocaleString()
      };
      await set(newOrderRef, orderData);
      
      const userName = currentUser.email?.split('@')[0] || "User";
      await sendTelegramNotification(userName, currentUser.uid, selectedUC, selectedPrice, gameId, currentOrderId);
      
      showToast(`✅ ဝယ်ယူမှုအောင်မြင်ပါသည်! Order ID: ${currentOrderId.substring(0,8)}... (Admin အတည်ပြုချက်ကို စောင့်ဆိုင်းပါ)`);
      
      currentBalance = newBalance;
      balanceSpan.innerText = `${currentBalance.toLocaleString()} Ks`;
      
      closeModal();
    } catch (err) {
      showToast("ဝယ်ယူမှုမအောင်မြင်ပါ: " + err.message, true);
    } finally {
      buyBtn.disabled = false;
      buyBtn.innerText = "ဝယ်ယူမည်";
    }
  };

  window.closeModal = () => {
    modal.classList.remove('show');
    gameIdInput.value = "";
  };

  async function loadUserData(uid) {
    const userRef = ref(db, `users/${uid}`);
    const snapshot = await get(userRef);
    if (snapshot.exists()) {
      currentBalance = snapshot.val().balance || 0;
      balanceSpan.innerText = `${currentBalance.toLocaleString()} Ks`;
    }
  }

  renderUCButtons();

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
    } else {
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
