<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>မှတ်တမ်း | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(165deg, #0a0f1e 0%, #0f172a 100%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(0,255,231,0.08), transparent);
      z-index: 0;
    }

    /* Header */
    .header {
      position: relative;
      z-index: 10;
      background: rgba(15, 25, 45, 0.85);
      backdrop-filter: blur(15px);
      padding: 20px 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0,255,231,0.3);
      flex-wrap: wrap;
      gap: 15px;
    }
    .back-btn {
      background: rgba(0,255,231,0.15);
      border: 1px solid #00ffe7;
      border-radius: 40px;
      padding: 8px 20px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
    }
    .header h1 {
      font-size: 1.4rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .stats-badge {
      background: rgba(0,255,231,0.1);
      border-radius: 30px;
      padding: 8px 18px;
      font-size: 0.85rem;
      border: 1px solid rgba(0,255,231,0.3);
    }
    .stats-badge span {
      color: #00ffe7;
      font-weight: bold;
      font-size: 1.2rem;
    }

    /* Timeline Container */
    .timeline {
      position: relative;
      z-index: 10;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px 80px 20px;
    }

    /* Timeline line */
    .timeline::before {
      content: '';
      position: absolute;
      left: 30px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, #00ffe7, #3b82f6, #00ffe7);
      opacity: 0.5;
    }

    /* Timeline item */
    .timeline-item {
      position: relative;
      margin-bottom: 30px;
      padding-left: 65px;
      animation: fadeSlide 0.5s ease forwards;
      opacity: 0;
    }
    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Timeline dot */
    .timeline-dot {
      position: absolute;
      left: 20px;
      top: 5px;
      width: 20px;
      height: 20px;
      background: #0a0f1e;
      border: 3px solid #00ffe7;
      border-radius: 50%;
      z-index: 5;
      transition: all 0.3s;
    }
    .timeline-item:hover .timeline-dot {
      transform: scale(1.3);
      background: #00ffe7;
      box-shadow: 0 0 15px #00ffe7;
    }

    /* Timeline content */
    .timeline-content {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s;
      cursor: pointer;
    }
    .timeline-content:hover {
      transform: translateX(5px);
      border-color: rgba(0,255,231,0.4);
      background: rgba(0,255,231,0.05);
    }

    /* Price color based on amount */
    .timeline-content.price-high {
      border-left: 4px solid #ef4444;
    }
    .timeline-content.price-medium {
      border-left: 4px solid #f59e0b;
    }
    .timeline-content.price-low {
      border-left: 4px solid #10b981;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .item-type {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
    }
    .item-type .icon {
      font-size: 1.3rem;
    }
    .item-price {
      font-size: 1.2rem;
      font-weight: bold;
      color: #00ffe7;
    }
    .item-details {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .item-details span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-date {
      font-size: 0.7rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Loading State */
    .loading-container {
      text-align: center;
      padding: 60px 20px;
    }
    .modern-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0,255,231,0.2);
      border-top: 3px solid #00ffe7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon {
      font-size: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: #94a3b8;
    }
    .empty-state p {
      color: #64748b;
      font-size: 0.85rem;
    }
    .shop-btn {
      margin-top: 25px;
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      border: none;
      border-radius: 40px;
      padding: 12px 30px;
      font-weight: bold;
      color: black;
      cursor: pointer;
      transition: all 0.2s;
    }
    .shop-btn:hover {
      transform: scale(1.05);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }

    @media (max-width: 550px) {
      .header {
        padding: 15px;
      }
      .header h1 {
        font-size: 1.1rem;
      }
      .timeline {
        padding: 20px 15px 70px 15px;
      }
      .timeline::before {
        left: 20px;
      }
      .timeline-item {
        padding-left: 50px;
      }
      .timeline-dot {
        left: 11px;
        width: 16px;
        height: 16px;
      }
      .item-price {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="header">
  <button class="back-btn" onclick="goBack()">← နောက်သို့</button>
  <h1>📜 ဝယ်ယူမှုမှတ်တမ်း</h1>
  <div class="stats-badge" id="statsBadge">💰 စုစုပေါင်း <span id="totalSpent">0</span> Ks</div>
</div>

<div class="timeline" id="timelineContainer">
  <div class="loading-container">
    <div class="modern-spinner"></div>
    <p>မှတ်တမ်းများ ဖတ်နေသည်...</p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, orderByChild, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const timelineContainer = document.getElementById('timelineContainer');
  const totalSpentSpan = document.getElementById('totalSpent');
  const toast = document.getElementById('toast');

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
    }, 2500);
  }

  function getPriceClass(price) {
    if (price >= 50000) return 'price-high';
    if (price >= 20000) return 'price-medium';
    return 'price-low';
  }

  function getTypeIcon(type) {
    const icons = {
      'Diamond': '💎',
      'diamond': '💎',
      'Game': '🎮',
      'game': '🎮',
      'Top Up': '⬆️',
      'topup': '⬆️'
    };
    return icons[type] || '🎁';
  }

  function formatDate(timestamp) {
    if (!timestamp) return 'ရက်စွဲမရှိ';
    const date = new Date(timestamp);
    const now = new Date();
    const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
    
    if (diffDays === 0) return 'ယနေ့ ' + date.toLocaleTimeString('my-MM', { hour: '2-digit', minute: '2-digit' });
    if (diffDays === 1) return 'မနေ့က ' + date.toLocaleTimeString('my-MM', { hour: '2-digit', minute: '2-digit' });
    if (diffDays < 7) return `${diffDays} ရက်အလက`;
    return date.toLocaleDateString('my-MM') + ' ' + date.toLocaleTimeString('my-MM', { hour: '2-digit', minute: '2-digit' });
  }

  window.goBack = () => {
    window.location.href = "home.html";
  };

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      showToast("ကျေးဇူးပြု၍ အကောင့်ဝင်ပါ");
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
      return;
    }

    const uid = user.uid;
    const ordersRef = ref(db, "orders/" + uid);
    const ordersQuery = orderByChild(ordersRef, "timestamp");

    onValue(ordersQuery, (snapshot) => {
      timelineContainer.innerHTML = "";
      
      const orders = [];
      let totalSpent = 0;
      
      snapshot.forEach((child) => {
        const order = { id: child.key, ...child.val() };
        orders.push(order);
        totalSpent += order.price || 0;
      });

      totalSpentSpan.innerText = totalSpent.toLocaleString();

      if (orders.length === 0) {
        timelineContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h3>မှတ်တမ်းမရှိသေးပါ</h3>
            <p>ဂိမ်းဆိုင်မှ ပထမဆုံးဝယ်ယူမှုပြုလုပ်ပါ</p>
            <button class="shop-btn" onclick="window.location.href='game.html'">🎮 ဂိမ်းများဝယ်ရန်</button>
          </div>
        `;
        return;
      }

      // Sort newest first
      orders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

      orders.forEach((order, index) => {
        const priceClass = getPriceClass(order.price || 0);
        const typeIcon = getTypeIcon(order.type);
        const dateStr = formatDate(order.timestamp);
        
        const div = document.createElement("div");
        div.className = `timeline-item`;
        div.style.animationDelay = `${index * 0.05}s`;
        
        div.innerHTML = `
          <div class="timeline-dot"></div>
          <div class="timeline-content ${priceClass}">
            <div class="item-header">
              <div class="item-type">
                <span class="icon">${typeIcon}</span>
                <span>${order.type || 'ဝယ်ယူမှု'}</span>
              </div>
              <div class="item-price">${(order.price || 0).toLocaleString()} Ks</div>
            </div>
            <div class="item-details">
              ${order.amount ? `<span>🔢 အရေအတွက်: ${order.amount}</span>` : ''}
              ${order.mlbbId ? `<span>🆔 ID: ${order.mlbbId}</span>` : ''}
              ${order.serverId ? `<span>🌐 Server: ${order.serverId}</span>` : ''}
            </div>
            <div class="item-date">
              <span>📅</span> ${dateStr}
            </div>
          </div>
        `;
        timelineContainer.appendChild(div);
      });
    }, (error) => {
      console.error("Error loading orders:", error);
      timelineContainer.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <h3>ဒေတာများ ဖတ်ယူရာတွင် အမှားရှိသည်</h3>
          <p>${error.message}</p>
          <button class="shop-btn" onclick="location.reload()">🔄 ပြန်စမ်းမည်</button>
        </div>
      `;
    });
  });
</script>

</body>
</html>
