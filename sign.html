<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign Up | John Gaming Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .particle {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle span {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(139, 92, 246, 0.6);
            border-radius: 50%;
            animation: floatParticle 10s infinite linear;
        }
        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-20vh) scale(1);
                opacity: 0;
            }
        }

        /* Glowing orbs */
        .glow-orb {
            position: fixed;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(139,92,246,0.25), transparent);
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 14s infinite alternate;
        }
        .glow-orb:nth-child(1) { top: -150px; left: -100px; }
        .glow-orb:nth-child(2) { bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(59,130,246,0.25), transparent); animation-duration: 18s; }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }

        .signup-container {
            position: relative;
            z-index: 10;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 40px 35px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(139, 92, 246, 0.3);
            transition: all 0.4s ease;
            animation: fadeScale 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .signup-container:hover {
            border-color: rgba(139, 92, 246, 0.7);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 35px rgba(139, 92, 246, 0.5);
            transform: translateY(-5px);
        }

        @keyframes fadeScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo-icon {
            text-align: center;
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px rgba(139,92,246,0.6));
            animation: iconPulse 2s infinite alternate;
        }
        @keyframes iconPulse {
            0% { filter: drop-shadow(0 0 5px rgba(139,92,246,0.4)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 20px rgba(139,92,246,0.9)); transform: scale(1.05); }
        }

        h2 {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0 5px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            font-size: 0.95rem;
            color: white;
            transition: all 0.3s ease;
            outline: none;
            font-weight: 500;
        }

        .input-group input::placeholder {
            color: #64748b;
            font-weight: 400;
        }

        .input-group input:focus {
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
        }

        .password-strength {
            margin-top: 5px;
            font-size: 0.7rem;
            padding-left: 15px;
        }
        .strength-weak { color: #ef4444; }
        .strength-medium { color: #f59e0b; }
        .strength-strong { color: #10b981; }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.6);
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .login-link a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #a78bfa;
            transition: width 0.3s;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: rgba(220,38,38,0.95);
            border-color: #ef4444;
        }

        .toast.success {
            background: rgba(16,185,129,0.95);
            border-color: #10b981;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 30px 22px;
            }
            h2 {
                font-size: 1.6rem;
            }
            .logo-icon {
                font-size: 2.8rem;
            }
            .toast {
                white-space: normal;
                text-align: center;
                max-width: 90%;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<div class="signup-container">
    <div class="logo-icon">🎮✨</div>
    <h2>Create Account</h2>
    <div class="subtitle">စတင်ပါ သင်၏ ဂိမ်းစွန့်စားခန်း</div>

    <form id="signupForm">
        <div class="input-group">
            <input type="text" id="name" placeholder="👤 နာမည် (အနည်းဆုံး 2 လုံး)" required>
        </div>
        <div class="input-group">
            <input type="tel" id="phone" placeholder="📞 ဖုန်းနံပါတ် (09xxxxxxxxx)" required>
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="📧 Email" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="🔒 စကားဝှက် (အနည်းဆုံး 6 လုံး)" required>
            <div class="password-strength" id="passwordStrength"></div>
        </div>
        <div class="input-group">
            <input type="password" id="confirm" placeholder="✓ စကားဝှက် အတည်ပြုရန်" required>
        </div>
        <button type="submit" id="signupBtn">🚀 Sign Up 🚀</button>
    </form>

    <div class="login-link">
        🔐 အကောင့်ရှိပြီးသားလား? <a href="login.html">Login ဝင်ပါ</a>
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your REAL Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
        authDomain: "john-gaming-shop.firebaseapp.com",
        projectId: "john-gaming-shop",
        storageBucket: "john-gaming-shop.firebasestorage.app",
        messagingSenderId: "40810672889",
        appId: "1:40810672889:web:5661a8db077037b346e828",
        measurementId: "G-M8PLKW0P8L"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM elements
    const form = document.getElementById('signupForm');
    const nameInput = document.getElementById('name');
    const phoneInput = document.getElementById('phone');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm');
    const signupBtn = document.getElementById('signupBtn');
    const toast = document.getElementById('toast');
    const passwordStrengthDiv = document.getElementById('passwordStrength');

    let isLoading = false;

    // Create floating particles
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 70; i++) {
            const span = document.createElement('span');
            const size = Math.random() * 4 + 1;
            span.style.width = `${size}px`;
            span.style.height = `${size}px`;
            span.style.left = `${Math.random() * 100}%`;
            span.style.animationDelay = `${Math.random() * 10}s`;
            span.style.animationDuration = `${Math.random() * 6 + 6}s`;
            span.style.background = `rgba(139, 92, 246, ${Math.random() * 0.5 + 0.2})`;
            container.appendChild(span);
        }
    }
    createParticles();

    function showToast(message, type = 'error') {
        toast.textContent = message;
        toast.className = `toast ${type} show`;
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3500);
    }

    function setLoading(loading) {
        isLoading = loading;
        if (loading) {
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';
        } else {
            signupBtn.disabled = false;
            signupBtn.innerHTML = '🚀 Sign Up 🚀';
        }
    }

    // Password strength checker
    function checkPasswordStrength(password) {
        if (password.length === 0) {
            passwordStrengthDiv.innerHTML = '';
            return;
        }
        if (password.length < 6) {
            passwordStrengthDiv.innerHTML = '🔴 အားနည်းသည် (အနည်းဆုံး 6 လုံး)';
            passwordStrengthDiv.className = 'password-strength strength-weak';
        } else if (password.length >= 6 && password.length < 10) {
            passwordStrengthDiv.innerHTML = '🟡 အလယ်အလတ်';
            passwordStrengthDiv.className = 'password-strength strength-medium';
        } else {
            passwordStrengthDiv.innerHTML = '🟢 အားကောင်းသည်';
            passwordStrengthDiv.className = 'password-strength strength-strong';
        }
    }

    passwordInput.addEventListener('input', (e) => {
        checkPasswordStrength(e.target.value);
    });

    // Validate Myanmar phone number
    function validatePhone(phone) {
        const phoneRegex = /^(09|\+?959)[0-9]{7,9}$/;
        return phoneRegex.test(phone);
    }

    // Validate name (at least 2 chars)
    function validateName(name) {
        return name.trim().length >= 2;
    }

    // Validate email format
    function validateEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    async function signupUser(name, phone, email, password) {
        try {
            // Create user in Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCredential.user.uid;

            // Save user data to Firestore
            await setDoc(doc(db, "users", uid), {
                name: name.trim(),
                phone: phone.trim(),
                email: email,
                balance: 0,
                plan: "free",
                createdAt: new Date().toISOString(),
                role: "user"
            });

            showToast(`🎉 အကောင့် အောင်မြင်စွာ ဖွင့်ပြီးပါပြီ! ${name} မင်္ဂလာပါ 🎉`, 'success');
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1800);

        } catch (error) {
            let errorMsg = "စာရင်းသွင်းမအောင်မြင်ပါ။ ";
            switch (error.code) {
                case 'auth/email-already-in-use':
                    errorMsg += "ဒီ Email နဲ့ အကောင့်ရှိပြီးသားပါ။";
                    break;
                case 'auth/weak-password':
                    errorMsg += "စကားဝှက်က အားနည်းလွန်းပါတယ် (အနည်းဆုံး 6 လုံး)";
                    break;
                case 'auth/invalid-email':
                    errorMsg += "Email ပုံစံမမှန်ပါ။";
                    break;
                default:
                    errorMsg += error.message;
            }
            showToast(errorMsg, 'error');
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (isLoading) return;

        const name = nameInput.value;
        const phone = phoneInput.value;
        const email = emailInput.value;
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        // Validations
        if (!validateName(name)) {
            showToast("နာမည်က အနည်းဆုံး 2 လုံးရှိရပါမယ်", 'error');
            return;
        }

        if (!validatePhone(phone)) {
            showToast("ဖုန်းနံပါတ်ပုံစံမှန်ကန်ပါစေ။ ဥပမာ - 09771234567", 'error');
            return;
        }

        if (!validateEmail(email)) {
            showToast("Email ပုံစံမှန်ကန်ပါစေ။ ဥပမာ - name@example.com", 'error');
            return;
        }

        if (password.length < 6) {
            showToast("စကားဝှက်က အနည်းဆုံး 6 လုံးရှိရပါမယ်", 'error');
            return;
        }

        if (password !== confirm) {
            showToast("စကားဝှက်နဲ့ အတည်ပြုစကားဝှက် မတူပါ", 'error');
            return;
        }

        setLoading(true);
        await signupUser(name, phone, email, password);
        setLoading(false);
    });
</script>
</body>
</html>
