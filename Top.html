<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>TOP 20 Buyers | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      padding-bottom: 40px;
      position: relative;
    }

    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 25px;
    }
    .header .icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
    }

    .stats-card {
      position: relative;
      z-index: 10;
      background: rgba(0, 255, 231, 0.1);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 10px 20px;
      max-width: 280px;
      margin: 0 auto 20px auto;
      text-align: center;
      border: 1px solid rgba(0,255,231,0.3);
    }
    .stats-card .label {
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .stats-card .value {
      font-size: 1.3rem;
      font-weight: bold;
      color: #00ffe7;
    }

    .buyer-list {
      position: relative;
      z-index: 10;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 10px;
    }

    .buyer-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 14px 18px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid rgba(0, 255, 231, 0.2);
      transition: all 0.3s ease;
    }
    .buyer-card:hover {
      transform: translateX(5px);
      border-color: #00ffe7;
      background: rgba(0, 255, 231, 0.08);
    }

    .rank {
      width: 45px;
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
    }
    .rank.gold { color: #ffd700; text-shadow: 0 0 5px #ffd700; }
    .rank.silver { color: #c0c0c0; text-shadow: 0 0 5px #c0c0c0; }
    .rank.bronze { color: #cd7f32; text-shadow: 0 0 5px #cd7f32; }

    .avatar {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .info {
      flex: 1;
    }
    .name {
      font-size: 1rem;
      font-weight: 600;
      color: white;
    }
    .spent {
      font-size: 0.7rem;
      color: #94a3b8;
    }

    .amount {
      font-size: 1.1rem;
      font-weight: bold;
      color: #00ffe7;
      text-align: right;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,255,231,0.2);
      border-top-color: #00ffe7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 50px;
      background: rgba(255,255,255,0.03);
      border-radius: 30px;
      border: 1px dashed rgba(0,255,231,0.3);
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .buyer-card {
        padding: 10px 14px;
        gap: 10px;
      }
      .rank {
        width: 35px;
        font-size: 1rem;
      }
      .avatar {
        width: 38px;
        height: 38px;
        font-size: 1rem;
      }
      .name {
        font-size: 0.85rem;
      }
      .amount {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">🏆</div>
  <h1>TOP 20 အဝယ်များဆုံး</h1>
</div>

<div class="stats-card">
  <div class="label">📊 စုစုပေါင်းအဝယ်များ</div>
  <div class="value" id="totalBuyers">0</div>
</div>

<div class="buyer-list" id="buyerList">
  <div class="loading">
    <div class="spinner"></div>
    <p>ထိပ်တန်းဝယ်သူများ ဖတ်နေသည်...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, once, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const buyerList = document.getElementById('buyerList');
  const totalBuyersSpan = document.getElementById('totalBuyers');

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => {
    window.location.href = "index.html";
  };

  function getRankIcon(rank) {
    if (rank === 1) return '👑';
    if (rank === 2) return '🥈';
    if (rank === 3) return '🥉';
    return '🎖️';
  }

  function getRankClass(rank) {
    if (rank === 1) return 'gold';
    if (rank === 2) return 'silver';
    if (rank === 3) return 'bronze';
    return '';
  }

  async function loadTopBuyers() {
    try {
      const snapshot = await get(ref(db, "topBuyers"));
      const data = snapshot.val();
      
      if (!data) {
        buyerList.innerHTML = `
          <div class="empty-state">
            <div style="font-size: 3rem; margin-bottom: 10px;">📭</div>
            <p>ဝယ်ယူမှုမှတ်တမ်း မရှိသေးပါ</p>
          </div>
        `;
        totalBuyersSpan.innerText = "0";
        return;
      }

      const buyers = [];
      for (let key in data) {
        const buyer = data[key];
        if (buyer.active !== false) {
          buyers.push({
            id: key,
            name: buyer.name || "အမည်မသိ",
            totalSpent: buyer.totalSpent || 0
          });
        }
      }

      buyers.sort((a, b) => b.totalSpent - a.totalSpent);
      const top20 = buyers.slice(0, 20);
      
      totalBuyersSpan.innerText = buyers.length;

      if (top20.length === 0) {
        buyerList.innerHTML = `
          <div class="empty-state">
            <div style="font-size: 3rem; margin-bottom: 10px;">📭</div>
            <p>ဝယ်ယူမှုမှတ်တမ်း မရှိသေးပါ</p>
          </div>
        `;
        return;
      }

      buyerList.innerHTML = "";

      top20.forEach((buyer, index) => {
        const rank = index + 1;
        const rankIcon = getRankIcon(rank);
        const rankClass = getRankClass(rank);
        const avatarLetter = buyer.name.charAt(0).toUpperCase();
        
        const card = document.createElement("div");
        card.className = "buyer-card";
        
        card.innerHTML = `
          <div class="rank ${rankClass}">${rankIcon} #${rank}</div>
          <div class="avatar">${avatarLetter}</div>
          <div class="info">
            <div class="name">${buyer.name}</div>
            <div class="spent">စုစုပေါင်းဝယ်ယူမှု</div>
          </div>
          <div class="amount">${buyer.totalSpent.toLocaleString()} Ks</div>
        `;
        
        buyerList.appendChild(card);
      });

    } catch (error) {
      console.error("Error loading top buyers:", error);
      buyerList.innerHTML = `
        <div class="empty-state">
          <div style="font-size: 3rem; margin-bottom: 10px;">⚠️</div>
          <p>ဒေတာများ ဖတ်ယူရာတွင် အမှားရှိသည်</p>
          <p style="font-size: 0.8rem; margin-top: 8px;">${error.message}</p>
        </div>
      `;
    }
  }

  loadTopBuyers();
</script>

</body>
</html>
