<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Game List | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    .particle { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle span { position: absolute; width: 3px; height: 3px; background: rgba(0, 255, 231, 0.4); border-radius: 50%; animation: floatParticle 10s infinite linear; }
    @keyframes floatParticle { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-20vh) scale(1); opacity: 0; } }
    .glow-orb { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,255,231,0.15), transparent); border-radius: 50%; filter: blur(60px); pointer-events: none; z-index: 0; animation: floatOrb 14s infinite alternate; }
    .glow-orb:nth-child(2) { bottom: 0; right: 0; background: radial-gradient(circle, rgba(59,130,246,0.15), transparent); animation-duration: 18s; }
    @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 30px) scale(1.2); } }
    
    /* Back Button */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }
        .header {
      position: relative; z-index: 10;
      background: rgba(15, 25, 45, 0.85);
      backdrop-filter: blur(12px);
      padding: 18px 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      border-bottom: 1px solid rgba(0, 255, 231, 0.3);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      letter-spacing: 1px;
    }
    .header span {
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .section-title {
      position: relative; z-index: 10;
      text-align: center;
      font-size: 22px;
      margin: 25px 0 15px;
      color: #00ffe7;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(0,255,231,0.3);
      letter-spacing: 1px;
    }
    .game-grid {
      position: relative; z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .game-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      border: 1px solid rgba(0, 255, 231, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .game-card:hover {
      transform: translateY(-8px);
      border-color: #00ffe7;      box-shadow: 0 15px 30px rgba(0, 255, 231, 0.2);
      background: rgba(0, 255, 231, 0.1);
    }
    .game-card img {
      width: 100%;
      max-width: 120px;
      height: auto;
      border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }
    .game-card:hover img { transform: scale(1.05); }
    .game-card h4 { font-size: 16px; margin: 10px 0 8px; color: white; font-weight: 600; }
    .buy-btn {
      background: linear-gradient(90deg, #00ffe7, #0077ff);
      border: none;
      border-radius: 30px;
      padding: 10px 20px;
      font-weight: bold;
      color: black;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      width: 100%;
      max-width: 120px;
      margin-top: 8px;
    }
    .buy-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,255,231,0.4); }
    
    @media (max-width: 550px) {
      .game-grid { gap: 15px; padding: 15px; }
      .section-title { font-size: 18px; }
      .header { font-size: 18px; padding: 14px; }
      .game-card h4 { font-size: 14px; }
      .buy-btn { font-size: 12px; padding: 8px 12px; }
      .back-btn { padding: 8px 18px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

</div>

<script>
  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();
  
  function goBack() {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
