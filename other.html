<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>Telegram Premium | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      padding-bottom: 40px;
      position: relative;
    }

    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 20px;
    }
    .header .icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
    }
    .header p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 5px;
    }

    .balance-card {
      position: relative;
      z-index: 10;
      background: rgba(0, 255, 231, 0.1);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 12px 20px;
      max-width: 280px;
      margin: 0 auto 20px auto;
      text-align: center;
      border: 1px solid rgba(0,255,231,0.3);
    }
    .balance-label {
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .balance-amount {
      font-size: 1.5rem;
      font-weight: bold;
      color: #00ffe7;
    }

    .premium-grid {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
      max-width: 800px;
      margin: 0 auto;
    }

    .premium-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(0, 255, 231, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .premium-card:hover {
      transform: translateY(-8px);
      border-color: #00ffe7;
      box-shadow: 0 15px 30px rgba(0, 255, 231, 0.15);
    }
    .premium-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    .premium-card h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    .premium-price {
      font-size: 1.3rem;
      font-weight: bold;
      color: #00ffe7;
      margin: 10px 0;
    }
    .premium-btn {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      border: none;
      border-radius: 40px;
      padding: 10px 20px;
      font-weight: bold;
      color: black;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .premium-btn:hover {
      transform: scale(1.02);
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: rgba(15, 25, 45, 0.98);
      border-radius: 32px;
      padding: 28px;
      width: 90%;
      max-width: 380px;
      border: 1px solid #00ffe7;
      animation: fadeScale 0.3s ease;
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-content h3 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      text-align: center;
      color: #00ffe7;
    }
    .modal-content p {
      margin: 8px 0;
      font-size: 0.9rem;
    }
    .modal-content input {
      width: 100%;
      padding: 12px 15px;
      margin: 12px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(0,255,231,0.3);
      border-radius: 30px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    .modal-content input:focus {
      border-color: #00ffe7;
    }
    .username-status {
      font-size: 0.8rem;
      margin: 5px 0;
      padding: 5px 10px;
      border-radius: 20px;
      text-align: center;
    }
    .status-valid { background: rgba(16,185,129,0.2); color: #10b981; }
    .status-invalid { background: rgba(220,38,38,0.2); color: #ef4444; }
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn.buy {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      color: black;
    }
    .modal-btn.close {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .modal-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .loading-text {
      text-align: center;
      margin: 10px 0;
      color: #f59e0b;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1100;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.error {
      border-color: #ef4444;
      background: rgba(220,38,38,0.9);
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .premium-grid {
        gap: 12px;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">⭐</div>
  <h1>Telegram Premium</h1>
  <p>တစ်လစာ ပိုမိုကောင်းမွန်သော အတွေ့အကြုံ</p>
</div>

<div class="balance-card">
  <div class="balance-label">💰 ငွေလက်ကျန်</div>
  <div class="balance-amount" id="balance">0 Ks</div>
</div>

<div class="premium-grid">
  <div class="premium-card" onclick="showPurchase('3 Months', 55000)">
    <div class="premium-icon">📅</div>
    <h3>3 လ</h3>
    <div class="premium-price">55,000 Ks</div>
    <button class="premium-btn">ဝယ်ယူမည်</button>
  </div>
  <div class="premium-card" onclick="showPurchase('6 Months', 78000)">
    <div class="premium-icon">📅📅</div>
    <h3>6 လ</h3>
    <div class="premium-price">78,000 Ks</div>
    <button class="premium-btn">ဝယ်ယူမည်</button>
  </div>
  <div class="premium-card" onclick="showPurchase('12 Months', 145000)">
    <div class="premium-icon">📅📅📅</div>
    <h3>12 လ</h3>
    <div class="premium-price">145,000 Ks</div>
    <button class="premium-btn">ဝယ်ယူမည်</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>⭐ Telegram Premium</h3>
    <p id="modalType">အမျိုးအစား: -</p>
    <p id="modalPrice">ကျသင့်ငွေ: -</p>
    <p id="modalBalance">လက်ကျန်ငွေ: -</p>
    <input type="text" id="telegramUsername" placeholder="Telegram Username (@example)">
    <button id="verifyBtn" class="modal-btn" style="background:rgba(0,255,231,0.2); color:#00ffe7; width:100%; margin-bottom:10px;" onclick="verifyUsername()">🔍 Username စစ်မည်</button>
    <div id="verifyStatus" class="username-status"></div>
    <div id="verifyLoading" style="display:none;" class="loading-text">⏳ စစ်ဆေးနေသည်...</div>
    <div class="modal-buttons">
      <button class="modal-btn close" onclick="closeModal()">ပိတ်မယ်</button>
      <button class="modal-btn buy" id="buyBtn" onclick="buyPremium()" disabled>ဝယ်ယူမည်</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const TELEGRAM_BOT_TOKEN = "8653967411:AAFfw-0pR8RysuPD6aoSlZ7w7d8XNNs8l_A";
  const TELEGRAM_CHAT_ID = "6427719618";

  let currentUser = null;
  let currentBalance = 0;
  let selectedType = "";
  let selectedPrice = 0;
  let isUsernameValid = false;

  const toast = document.getElementById('toast');
  const modal = document.getElementById('modal');
  const balanceSpan = document.getElementById('balance');
  const modalType = document.getElementById('modalType');
  const modalPrice = document.getElementById('modalPrice');
  const modalBalance = document.getElementById('modalBalance');
  const telegramUsername = document.getElementById('telegramUsername');
  const verifyStatus = document.getElementById('verifyStatus');
  const verifyLoading = document.getElementById('verifyLoading');
  const buyBtn = document.getElementById('buyBtn');

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = isError ? 'toast error show' : 'toast show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => {
    window.location.href = "index.html";
  };

  async function sendTelegramNotification(userName, userId, duration, price, tgUsername) {
    const message = `⭐ Telegram Premium အသစ်ဝယ်ယူမှု ⭐\n\n━━━━━━━━━━━━━━━━━━━━\n👤 အမည်: ${userName}\n🆔 User ID: ${userId}\n📅 ကြာချိန်: ${duration}\n💰 ကျသင့်ငွေ: ${price.toLocaleString()} MMK\n📱 Telegram Username: ${tgUsername}\n━━━━━━━━━━━━━━━━━━━━\n⏰ ဝယ်ယူချိန်: ${new Date().toLocaleString()}\n\n✅ ကျေးဇူးတင်ပါသည်။`;
    
    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    try {
      await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message,
          parse_mode: 'HTML'
        })
      });
    } catch (err) {
      console.error("Telegram error:", err);
    }
  }

  window.showPurchase = async (type, price) => {
    if (!currentUser) {
      showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်", true);
      return;
    }
    selectedType = type;
    selectedPrice = price;
    isUsernameValid = false;
    buyBtn.disabled = true;
    telegramUsername.value = "";
    verifyStatus.innerHTML = "";
    verifyStatus.className = "username-status";
    
    modalType.innerText = `အမျိုးအစား: ${type}`;
    modalPrice.innerText = `ကျသင့်ငွေ: ${price.toLocaleString()} Ks`;
    modalBalance.innerText = `လက်ကျန်ငွေ: ${currentBalance.toLocaleString()} Ks`;
    modal.classList.add('show');
  };

  window.verifyUsername = async () => {
    const username = telegramUsername.value.trim();
    if (!username) {
      showToast("Telegram Username ထည့်ပါ", true);
      return;
    }
    if (!username.startsWith('@')) {
      showToast("Username က @ နဲ့စတင်ရပါမယ်", true);
      return;
    }
    
    verifyLoading.style.display = "block";
    verifyStatus.innerHTML = "";
    
    setTimeout(() => {
      verifyLoading.style.display = "none";
      isUsernameValid = true;
      verifyStatus.innerHTML = "✅ Username မှန်ကန်ပါသည်";
      verifyStatus.className = "username-status status-valid";
      buyBtn.disabled = false;
    }, 1000);
  };

  window.buyPremium = async () => {
    if (!currentUser) return;
    if (!isUsernameValid) {
      showToast("Username ကို ဦးစွာစစ်ဆေးပါ", true);
      return;
    }
    
    const username = telegramUsername.value.trim();
    if (currentBalance < selectedPrice) {
      showToast("လက်ကျန်ငွေ မလုံလောက်ပါ", true);
      return;
    }
    
    buyBtn.disabled = true;
    buyBtn.innerText = "လုပ်ဆောင်နေသည်...";
    
    try {
      const userRef = ref(db, `users/${currentUser.uid}`);
      const newBalance = currentBalance - selectedPrice;
      await update(userRef, { balance: newBalance });
      
      const order = {
        type: "TelegramPremium",
        duration: selectedType,
        price: selectedPrice,
        username: username,
        status: "pending",
        timestamp: Date.now()
      };
      await push(ref(db, `orders/${currentUser.uid}`), order);
      
      const userName = currentUser.email?.split('@')[0] || "User";
      
      await sendTelegramNotification(userName, currentUser.uid, selectedType, selectedPrice, username);
      
      showToast(`✅ ${selectedType} Telegram Premium ဝယ်ယူမှုအောင်မြင်ပါသည်!`);
      
      currentBalance = newBalance;
      balanceSpan.innerText = `${currentBalance.toLocaleString()} Ks`;
      
      closeModal();
    } catch (err) {
      showToast("ဝယ်ယူမှုမအောင်မြင်ပါ: " + err.message, true);
    } finally {
      buyBtn.disabled = false;
      buyBtn.innerText = "ဝယ်ယူမည်";
    }
  };

  window.closeModal = () => {
    modal.classList.remove('show');
    telegramUsername.value = "";
    verifyStatus.innerHTML = "";
    isUsernameValid = false;
    buyBtn.disabled = true;
  };

  async function loadUserData(uid) {
    const userRef = ref(db, `users/${uid}`);
    const snapshot = await get(userRef);
    if (snapshot.exists()) {
      currentBalance = snapshot.val().balance || 0;
      balanceSpan.innerText = `${currentBalance.toLocaleString()} Ks`;
    }
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
    } else {
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
