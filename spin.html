<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>Spin Wheel | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      position: relative;
    }

    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 20px;
    }
    .header .icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
    }

    .token-card {
      position: relative;
      z-index: 10;
      background: rgba(0, 255, 231, 0.1);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 12px 20px;
      max-width: 280px;
      margin: 0 auto 15px auto;
      text-align: center;
      border: 1px solid rgba(0,255,231,0.3);
    }
    .token-label {
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .token-count {
      font-size: 1.8rem;
      font-weight: bold;
      color: #00ffe7;
    }
    .token-hint {
      font-size: 0.6rem;
      color: #f59e0b;
      margin-top: 5px;
    }

    .wheel-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      margin: 20px auto;
    }
    .wheel-container {
      position: relative;
      width: 300px;
      height: 300px;
    }
    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,255,231,0.3), 0 10px 30px rgba(0,0,0,0.5);
      transition: transform 4s cubic-bezier(0.2, 0.9, 0.1, 1.1);
    }
    .arrow {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 35px;
      color: #00ffe7;
      filter: drop-shadow(0 0 5px #00ffe7);
      z-index: 15;
    }
    .center-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      border: none;
      border-radius: 50%;
      font-weight: bold;
      color: black;
      font-size: 14px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 0 20px rgba(0,255,231,0.5);
      transition: all 0.2s;
    }
    .center-btn:hover:not(:disabled) {
      transform: translate(-50%, -50%) scale(1.05);
    }
    .center-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result-card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 20px;
      margin-top: 25px;
      text-align: center;
      border: 1px solid rgba(0,255,231,0.2);
    }
    .prize-badge {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .result-text {
      font-size: 1.2rem;
      font-weight: bold;
      color: #00ffe7;
    }

    .history-section {
      position: relative;
      z-index: 10;
      margin-top: 25px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .history-title {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 10px;
      text-align: center;
    }
    .history-list {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 10px;
      max-height: 150px;
      overflow-y: auto;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .history-prize {
      color: #00ffe7;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.error {
      border-color: #ef4444;
      background: rgba(220,38,38,0.9);
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .wheel-container {
        width: 250px;
        height: 250px;
      }
      .center-btn {
        width: 65px;
        height: 65px;
        font-size: 12px;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">🎰</div>
  <h1>Spin & Win</h1>
</div>

<div class="token-card">
  <div class="token-label">🎫 လက်ကျန် Spin Token</div>
  <div class="token-count" id="tokenCount">0</div>
  <div class="token-hint">✨ ဂိမ်းတစ်ခုဝယ်တိုင်း Token 1 ခုရမည်</div>
</div>

<div class="wheel-wrapper">
  <div class="wheel-container">
    <canvas id="wheelCanvas" width="300" height="300" style="width:100%; height:100%; border-radius:50%; box-shadow:0 0 30px rgba(0,255,231,0.3);"></canvas>
    <div class="arrow">▼</div>
    <button class="center-btn" id="spinBtn" onclick="spinWheel()">SPIN</button>
  </div>
</div>

<div class="result-card" id="resultCard" style="display: none;">
  <div class="prize-badge" id="prizeEmoji">🎁</div>
  <div class="result-text" id="resultText"></div>
</div>

<div class="history-section">
  <div class="history-title">📜 ရရှိခဲ့သောဆုများ</div>
  <div class="history-list" id="historyList">
    <div style="text-align:center;color:#64748b;">ဆုများမရှိသေးပါ</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const PRIZES = [
    { name: "💰 50 ks", amount: 50, emoji: "💰", color: "#ffcc70", type: "money", prob: 60 },
    { name: "🎫 2 Spins", amount: 2, emoji: "🎫", color: "#92fe9d", type: "spin", prob: 20 },
    { name: "💳 လျော့ဈေး (10%)", amount: 0, emoji: "💳", color: "#00c9ff", type: "discount", prob: 10 },
    { name: "💵 100 Ks", amount: 100, emoji: "💵", color: "#f5576c", type: "money", prob: 9 },
    { name: "✨ Starlight Card 1 ကဒ်", amount: 1, emoji: "✨", color: "#ffd700", type: "starlight", prob: 1 }
  ];

  const TOTAL_PROB = PRIZES.reduce((s, p) => s + p.prob, 0);
  
  let currentUser = null;
  let spinTokens = 0;
  let isSpinning = false;

  const toast = document.getElementById('toast');
  const spinBtn = document.getElementById('spinBtn');
  const tokenCountSpan = document.getElementById('tokenCount');
  const resultCard = document.getElementById('resultCard');
  const prizeEmoji = document.getElementById('prizeEmoji');
  const resultText = document.getElementById('resultText');
  const historyList = document.getElementById('historyList');

  function showToast(msg, isErr = false) {
    toast.textContent = msg;
    toast.className = isErr ? 'toast error show' : 'toast show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => window.location.href = "home.html";

  function getRandomPrize() {
    const rand = Math.random() * TOTAL_PROB;
    let sum = 0;
    for (const p of PRIZES) {
      sum += p.prob;
      if (rand <= sum) return p;
    }
    return PRIZES[0];
  }

  function drawWheel() {
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const size = 300;
    canvas.width = size;
    canvas.height = size;
    const cx = size / 2, cy = size / 2, r = size / 2;
    let curAng = 0;
    for (const p of PRIZES) {
      const angSize = (p.prob / TOTAL_PROB) * 360;
      const start = curAng * Math.PI / 180;
      const end = (curAng + angSize) * Math.PI / 180;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + (angSize / 2) * Math.PI / 180);
      ctx.textAlign = "center";
      ctx.fillStyle = "#1e293b";
      ctx.font = "bold 14px Poppins";
      ctx.fillText(p.emoji, 65, 8);
      ctx.restore();
      curAng += angSize;
    }
    ctx.beginPath();
    ctx.arc(cx, cy, 35, 0, 2 * Math.PI);
    ctx.fillStyle = "#0a0f1e";
    ctx.fill();
    ctx.strokeStyle = "#00ffe7";
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  async function loadUserData(uid) {
    const userDoc = await getDoc(doc(db, "users", uid));
    if (userDoc.exists()) {
      spinTokens = userDoc.data().spinTokens || 0;
      tokenCountSpan.innerText = spinTokens;
    }
  }

  async function loadHistory(uid) {
    const hDoc = await getDoc(doc(db, "spinHistory", uid));
    if (hDoc.exists()) {
      const hist = hDoc.data().history || [];
      if (hist.length === 0) {
        historyList.innerHTML = '<div style="text-align:center;color:#64748b;">ဆုများမရှိသေးပါ</div>';
      } else {
        historyList.innerHTML = hist.slice(-5).reverse().map(h => `
          <div class="history-item"><span>${h.date}</span><span class="history-prize">${h.prize}</span></div>
        `).join('');
      }
    }
  }

  async function applyPrize(prize, uid) {
    const userRef = doc(db, "users", uid);
    if (prize.type === "money") {
      await updateDoc(userRef, { balance: increment(prize.amount) });
      showToast(`🎉 ${prize.name} +${prize.amount} Ks`);
    } else if (prize.type === "spin") {
      await updateDoc(userRef, { spinTokens: increment(prize.amount) });
      spinTokens += prize.amount;
      tokenCountSpan.innerText = spinTokens;
      showToast(`🎉 ${prize.name} +${prize.amount} Spin Token`);
    } else if (prize.type === "starlight") {
      await updateDoc(userRef, { starlightCards: increment(prize.amount) });
      showToast(`✨ ${prize.name} ရရှိပါသည်!`);
    } else if (prize.type === "discount") {
      await updateDoc(userRef, { discountAvailable: true, discountAmount: 10 });
      showToast(`🎉 ${prize.name} ရရှိပါသည်!`);
    }
  }

  function getPrizeAngle(prizeName) {
    let cum = 0;
    for (const p of PRIZES) {
      const a = (p.prob / TOTAL_PROB) * 360;
      if (p.name === prizeName) return cum + (a / 2);
      cum += a;
    }
    return 0;
  }

  window.spinWheel = async function() {
    if (!currentUser) { showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်", true); return; }
    if (isSpinning) return;
    const userRef = doc(db, "users", currentUser.uid);
    const uDoc = await getDoc(userRef);
    const tokens = uDoc.exists() ? uDoc.data().spinTokens || 0 : 0;
    if (tokens <= 0) { showToast("❌ Spin Token မရှိတော့ပါ", true); return; }
    
    isSpinning = true;
    spinBtn.disabled = true;
    await updateDoc(userRef, { spinTokens: increment(-1) });
    spinTokens = tokens - 1;
    tokenCountSpan.innerText = spinTokens;
    
    const prize = getRandomPrize();
    const targetAngle = getPrizeAngle(prize.name);
    const spins = 5 + Math.random() * 5;
    const rot = (spins * 360) + (360 - targetAngle);
    const canvas = document.getElementById('wheelCanvas');
    canvas.style.transform = `rotate(${rot}deg)`;
    canvas.style.transition = 'transform 4s cubic-bezier(0.2, 0.9, 0.1, 1.1)';
    
    setTimeout(async () => {
      await applyPrize(prize, currentUser.uid);
      const hRef = doc(db, "spinHistory", currentUser.uid);
      const hDoc = await getDoc(hRef);
      let hist = hDoc.exists() ? hDoc.data().history || [] : [];
      hist.unshift({ date: new Date().toLocaleString('my-MM'), prize: prize.name, timestamp: Date.now() });
      if (hist.length > 10) hist = hist.slice(0, 10);
      await setDoc(hRef, { history: hist });
      resultCard.style.display = 'block';
      prizeEmoji.innerHTML = prize.emoji;
      resultText.innerHTML = `သင်ရရှိသောဆု: ${prize.name}`;
      await loadHistory(currentUser.uid);
      isSpinning = false;
      spinBtn.disabled = false;
      setTimeout(() => { canvas.style.transform = ''; canvas.style.transition = ''; }, 500);
    }, 4000);
  };

  drawWheel();

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
      await loadHistory(user.uid);
    } else {
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
