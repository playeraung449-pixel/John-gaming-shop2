<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>Spin Wheel | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      position: relative;
    }
    .particle { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle span { position: absolute; width: 3px; height: 3px; background: rgba(0, 255, 231, 0.4); border-radius: 50%; animation: floatParticle 10s infinite linear; }
    @keyframes floatParticle { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-20vh) scale(1); opacity: 0; } }
    .glow-orb { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,255,231,0.1), transparent); border-radius: 50%; filter: blur(60px); pointer-events: none; z-index: 0; animation: floatOrb 14s infinite alternate; }
    @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 30px) scale(1.2); } }
    .back-btn { position: fixed; top: 20px; left: 20px; z-index: 20; background: rgba(0, 255, 231, 0.15); backdrop-filter: blur(8px); border: 1px solid rgba(0, 255, 231, 0.4); border-radius: 40px; padding: 10px 22px; font-weight: bold; color: #00ffe7; cursor: pointer; font-size: 14px; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
    .back-btn:hover { background: #00ffe7; color: black; transform: translateX(-3px); box-shadow: 0 0 15px rgba(0,255,231,0.5); }
    .header { position: relative; z-index: 10; text-align: center; margin-bottom: 20px; }
    .header .icon { font-size: 3rem; filter: drop-shadow(0 0 15px rgba(0,255,231,0.5)); animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .header h1 { font-size: 1.6rem; background: linear-gradient(135deg, #00ffe7, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; margin-top: 8px; }
    .token-card { position: relative; z-index: 10; background: rgba(0, 255, 231, 0.1); backdrop-filter: blur(8px); border-radius: 30px; padding: 12px 20px; max-width: 280px; margin: 0 auto 15px auto; text-align: center; border: 1px solid rgba(0,255,231,0.3); }
    .token-label { font-size: 0.7rem; color: #94a3b8; }
    .token-count { font-size: 1.8rem; font-weight: bold; color: #00ffe7; }
    .token-hint { font-size: 0.6rem; color: #f59e0b; margin-top: 5px; }
    .wheel-wrapper { position: relative; z-index: 10; display: flex; justify-content: center; margin: 20px auto; }
    .wheel-container { position: relative; width: 300px; height: 300px; }
    .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(0,255,231,0.3), 0 10px 30px rgba(0,0,0,0.5); transition: transform 4s cubic-bezier(0.2, 0.9, 0.1, 1.1); }
    .arrow { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 35px; color: #00ffe7; filter: drop-shadow(0 0 5px #00ffe7); z-index: 15; }
    .center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: linear-gradient(135deg, #00ffe7, #3b82f6); border: none; border-radius: 50%; font-weight: bold; color: black; font-size: 14px; cursor: pointer; z-index: 20; box-shadow: 0 0 20px rgba(0,255,231,0.5); transition: all 0.2s; }
    .center-btn:hover:not(:disabled) { transform: translate(-50%, -50%) scale(1.05); }
    .center-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .result-card { position: relative; z-index: 10; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 30px; padding: 20px; margin-top: 25px; text-align: center; border: 1px solid rgba(0,255,231,0.2); }
    .prize-badge { font-size: 2rem; margin-bottom: 10px; }
    .result-text { font-size: 1.2rem; font-weight: bold; color: #00ffe7; }
    .history-section { position: relative; z-index: 10; margin-top: 25px; max-width: 400px; margin-left: auto; margin-right: auto; }
    .history-title { font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; text-align: center; }
    .history-list { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 10px; max-height: 150px; overflow-y: auto; }
    .history-item { display: flex; justify-content: space-between; padding: 8px 12px; font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .history-prize { color: #00ffe7; }    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; white-space: nowrap; border: 1px solid #00ffe7; }
    .toast.show { opacity: 1; }
    .toast.error { border-color: #ef4444; background: rgba(220,38,38,0.9); }
    @media (max-width: 550px) { body { padding: 15px; padding-top: 70px; } .wheel-container { width: 250px; height: 250px; } .center-btn { width: 65px; height: 65px; font-size: 12px; } .toast { white-space: normal; text-align: center; max-width: 90%; } }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">🎰</div>
  <h1>Spin & Win</h1>
</div>

<div class="token-card">
  <div class="token-label">🎫 လက်ကျန် Spin Token</div>
  <div class="token-count" id="tokenCount">0</div>
  <div class="token-hint">✨ game items တစ်ခုဝယ်တိုင်း Token 1 ခုရမည်</div>
</div>

<div class="wheel-wrapper">
  <div class="wheel-container">
    <canvas id="wheelCanvas" width="300" height="300" style="width:100%; height:100%; border-radius:50%; box-shadow:0 0 30px rgba(0,255,231,0.3);"></canvas>
    <div class="arrow">▼</div>
    <button class="center-btn" id="spinBtn" onclick="spinWheel()">SPIN</button>
  </div>
</div>

<div class="result-card" id="resultCard" style="display: none;">
  <div class="prize-badge" id="prizeEmoji">🎁</div>
  <div class="result-text" id="resultText"></div>
</div>

<div class="history-section">
  <div class="history-title">📜 ရရှိခဲ့သောဆုများ</div>
  <div class="history-list" id="historyList">
    <div style="text-align:center;color:#64748b;">ဆုများမရှိသေးပါ</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // 🔑 Supabase Config
  const SUPABASE_URL = 'https://ibrdrdumqqcskxfbmect.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlicmRyZHVtcXFjc2t4ZmJtZWN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTAxMDgsImV4cCI6MjA5NTQ2NjEwOH0.r1UB_IL7J9AxIDhwO9uXxn2EdQW4lReCrPk6JlTh0cE';  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 🎁 ပေါက်နိုင်တဲ့ ဆုများ (စုစုပေါင်း 100%)
  const PRIZES = [
    { name: "💰 50 ကျပ်", amount: 50, emoji: "💰", color: "#ffcc70", type: "money", prob: 60 },
    { name: "🎫 2 Spins", amount: 2, emoji: "🎫", color: "#92fe9d", type: "spin", prob: 20 },
    { name: "💳 လျှော့ဈေး (10%)", amount: 0, emoji: "", color: "#00c9ff", type: "discount", prob: 10 },
    { name: "💵 100 ကျပ်", amount: 100, emoji: "💵", color: "#f5576c", type: "money", prob: 10 }
  ];

  // ✨ Starlight Card (ဘီးပေါ်မှာ ပြဖို့သာ - ပေါက်နိုင်ခြေ 0%)
  const COSMETIC_PRIZE = { name: "✨ Starlight", emoji: "✨", color: "#ffd700", angleSize: 5 }; // 5° only for display

  const TOTAL_PROB = PRIZES.reduce((s, p) => s + p.prob, 0); // 100
  
  let currentUser = null;
  let spinTokens = 0;
  let isSpinning = false;

  const toast = document.getElementById('toast');
  const spinBtn = document.getElementById('spinBtn');
  const tokenCountSpan = document.getElementById('tokenCount');
  const resultCard = document.getElementById('resultCard');
  const prizeEmoji = document.getElementById('prizeEmoji');
  const resultText = document.getElementById('resultText');
  const historyList = document.getElementById('historyList');

  function showToast(msg, isErr = false) {
    toast.textContent = msg;
    toast.className = isErr ? 'toast error show' : 'toast show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => { window.location.href = "index.html"; };
  // 🎲 ပေါက်နိုင်တဲ့ ဆုထဲကပဲ ကျပန်းရွေးမည်
  function getRandomPrize() {
    const rand = Math.random() * TOTAL_PROB;
    let sum = 0;
    for (const p of PRIZES) {
      sum += p.prob;
      if (rand <= sum) return p;
    }
    return PRIZES[0];
  }

  // 🎨 ီးဆွဲခြင်း (Cosmetic Starlight ထည့်ဆွဲ)
  function drawWheel() {
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const size = 300;
    canvas.width = size;
    canvas.height = size;
    const cx = size / 2, cy = size / 2, r = size / 2;
    let curAng = 0;
    
    // ပေါက်နိုင်တဲ့ ဆုများကို ဖြစ်နိုင်ခြေအလိုက် ဆွဲမည်
    for (const p of PRIZES) {
      const angSize = (p.prob / TOTAL_PROB) * 360;
      const start = curAng * Math.PI / 180;
      const end = (curAng + angSize) * Math.PI / 180;
      
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.fillStyle = p.color;
      ctx.fill();
      
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + (angSize / 2) * Math.PI / 180);
      ctx.textAlign = "center";
      ctx.fillStyle = "#1e293b";
      ctx.font = "bold 14px Poppins";
      ctx.fillText(p.emoji, 65, 8);
      ctx.restore();
      
      curAng += angSize;
    }
    
    // ✨ Cosmetic Starlight (ဘီးအဆုံးမှာ ၅ ဒီဂရီလောက် နေရာယူပြီး ပြမည် - ပေါက်နိုင်ခြေမရှိ)
    const start = curAng * Math.PI / 180;
    const end = (curAng + COSMETIC_PRIZE.angleSize) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx, cy);    ctx.arc(cx, cy, r, start, end);
    ctx.fillStyle = COSMETIC_PRIZE.color;
    ctx.fill();
    
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + (COSMETIC_PRIZE.angleSize / 2) * Math.PI / 180);
    ctx.textAlign = "center";
    ctx.fillStyle = "#1e293b";
    ctx.font = "bold 12px Poppins";
    ctx.fillText(COSMETIC_PRIZE.emoji, 70, 5);
    ctx.restore();
    
    // Center circle
    ctx.beginPath();
    ctx.arc(cx, cy, 35, 0, 2 * Math.PI);
    ctx.fillStyle = "#0a0f1e";
    ctx.fill();
    ctx.strokeStyle = "#00ffe7";
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  async function loadUserData(uid) {
    try {
      const { data: profile, error } = await supabase.from('user_profiles').select('spin_tokens, starlight_cards, discount_available, discount_amount').eq('id', uid).single();
      if (error && error.code !== 'PGRST116') throw error;
      if (profile) {
        spinTokens = profile.spin_tokens || 0;
        tokenCountSpan.innerText = spinTokens;
      }
    } catch (err) { console.error("Error loading user data:", err); }
  }

  async function loadHistory(uid) {
    try {
      const { data: history, error } = await supabase.from('spin_history').select('prize, created_at').eq('user_id', uid).order('created_at', { ascending: false }).limit(5);
      if (error) throw error;
      if (!history || history.length === 0) {
        historyList.innerHTML = '<div style="text-align:center;color:#64748b;">ဆုများမရှိသေးပါ</div>';
      } else {
        historyList.innerHTML = history.map(h => `<div class="history-item"><span>${new Date(h.created_at).toLocaleDateString('my-MM')}</span><span class="history-prize">${h.prize}</span></div>`).join('');
      }
    } catch (err) { console.error("Error loading history:", err); }
  }

  async function applyPrize(prize, uid) {
    try {
      if (prize.type === "money") {
        const { data: profile } = await supabase.from('user_profiles').select('balance').eq('id', uid).single();        const newBalance = (profile?.balance || 0) + prize.amount;
        await supabase.from('user_profiles').update({ balance: newBalance }).eq('id', uid);
        showToast(`🎉 ${prize.name} +${prize.amount} ကျပ်`);
      } else if (prize.type === "spin") {
        const { data: profile } = await supabase.from('user_profiles').select('spin_tokens').eq('id', uid).single();
        const newTokens = (profile?.spin_tokens || 0) + prize.amount;
        await supabase.from('user_profiles').update({ spin_tokens: newTokens }).eq('id', uid);
        spinTokens = newTokens;
        tokenCountSpan.innerText = spinTokens;
        showToast(`🎉 ${prize.name} +${prize.amount} Spin Token`);
      } else if (prize.type === "discount") {
        await supabase.from('user_profiles').update({ discount_available: true, discount_amount: 10 }).eq('id', uid);
        showToast(`🎉 ${prize.name} ရရှိပါသည်!`);
      }
    } catch (err) { console.error("Error applying prize:", err); showToast("ဆုချီးမြှင့်ရာတွင် အမှားရှိသည်", true); }
  }

  // 🎰 Spin Logic (Starlight ကို လုံးဝရွေးချယ်မှုထဲ မထည့်တော့)
  window.spinWheel = async function() {
    if (!currentUser) { showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်", true); return; }
    if (isSpinning) return;
    
    const { data: profile } = await supabase.from('user_profiles').select('spin_tokens').eq('id', currentUser.id).single();
    const tokens = profile?.spin_tokens || 0;
    if (tokens <= 0) { showToast("❌ Spin Token မရှိတော့ပါ", true); return; }
    
    isSpinning = true;
    spinBtn.disabled = true;
    
    await supabase.from('user_profiles').update({ spin_tokens: tokens - 1 }).eq('id', currentUser.id);
    spinTokens = tokens - 1;
    tokenCountSpan.innerText = spinTokens;
    
    // ✅ ပေါက်နိုင်တဲ့ ဆုထဲကပဲ ရွေးမည် (Starlight မပါ)
    const prize = getRandomPrize();
    
    //  ဘီးရပ်မည့် ထောင့်ကို တွက်ချက်ခြင်း (ပေါက်နိုင်တဲ့ ဆုများအတွက်သာ)
    let targetAngle = 0;
    let cum = 0;
    for (const p of PRIZES) {
      const a = (p.prob / TOTAL_PROB) * 360;
      if (p.name === prize.name) { targetAngle = cum + (a / 2); break; }
      cum += a;
    }
    
    const spins = 5 + Math.random() * 5;
    const rot = (spins * 360) + (360 - targetAngle);
    
    const canvas = document.getElementById('wheelCanvas');
    canvas.style.transform = `rotate(${rot}deg)`;    canvas.style.transition = 'transform 4s cubic-bezier(0.2, 0.9, 0.1, 1.1)';
    
    setTimeout(async () => {
      await applyPrize(prize, currentUser.id);
      
      await supabase.from('spin_history').insert({
        user_id: currentUser.id,
        prize: prize.name,
        prize_type: prize.type,
        amount: prize.amount
      });
      
      resultCard.style.display = 'block';
      prizeEmoji.innerHTML = prize.emoji;
      resultText.innerHTML = `သင်ရရှိသောဆု: ${prize.name}`;
      
      await loadHistory(currentUser.id);
      
      isSpinning = false;
      spinBtn.disabled = false;
      
      setTimeout(() => { 
        canvas.style.transform = ''; 
        canvas.style.transition = ''; 
      }, 500);
      
    }, 4000);
  };

  async function initAuth() {
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
      currentUser = user;
      drawWheel();
      await loadUserData(user.id);
      await loadHistory(user.id);
    } else {
      window.location.href = "login.html";
    }
  }

  document.addEventListener('DOMContentLoaded', initAuth);
</script>

</body>
</html>
