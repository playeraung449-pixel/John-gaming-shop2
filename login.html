<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>John Gaming Shop - Elite Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 50%, #0a0f1e, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .particle {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(59, 130, 246, 0.5);
            border-radius: 50%;
            animation: floatParticle 8s infinite linear;
        }
        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-20vh) scale(1);
                opacity: 0;
            }
        }

        /* Floating glowing orbs */
        .glow-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,0.3), transparent);
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 12s infinite alternate;
        }
        .glow-orb:nth-child(1) { top: -100px; left: -100px; }
        .glow-orb:nth-child(2) { bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(168,85,247,0.3), transparent); animation-duration: 15s; }
        .glow-orb:nth-child(3) { top: 50%; left: 50%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(6,182,212,0.15), transparent); animation-duration: 20s; }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(50px, 50px) scale(1.2); opacity: 0.8; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 45px 40px;
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(59, 130, 246, 0.2);
            transition: all 0.4s ease;
            animation: fadeScale 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .login-container:hover {
            border-color: rgba(59, 130, 246, 0.6);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 30px rgba(59, 130, 246, 0.4);
            transform: translateY(-5px);
        }

        @keyframes fadeScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 15px rgba(59,130,246,0.6));
            animation: iconPulse 2s infinite alternate;
        }
        @keyframes iconPulse {
            0% { filter: drop-shadow(0 0 5px rgba(59,130,246,0.4)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 20px rgba(59,130,246,0.9)); transform: scale(1.05); }
        }

        h2 {
            color: #ffffff;
            font-size: 2rem;
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #93c5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 22px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s ease;
            outline: none;
            font-weight: 500;
        }

        .input-group input::placeholder {
            color: #64748b;
            font-weight: 400;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.6);
            background: linear-gradient(90deg, #2563eb, #7c3aed);
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
        }

        .signup-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .signup-text a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            position: relative;
        }

        .signup-text a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #60a5fa;
            transition: width 0.3s;
        }

        .signup-text a:hover::after {
            width: 100%;
        }

        .signup-text a:hover {
            text-shadow: 0 0 5px rgba(96,165,250,0.5);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: rgba(220,38,38,0.9);
            border-color: #ef4444;
        }

        .toast.success {
            background: rgba(16,185,129,0.9);
            border-color: #10b981;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 35px 25px;
            }
            h2 {
                font-size: 1.6rem;
            }
            .logo-icon {
                font-size: 3rem;
            }
            .toast {
                white-space: normal;
                text-align: center;
                max-width: 90%;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<div class="login-container">
    <div class="logo-area">
        <div class="logo-icon">🎮</div>
        <h2>John Gaming Shop</h2>
        <div class="subtitle">ဝင်ရောက်ပါ အဆင့်မြင့် ဂိမ်းလောကကို</div>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <input type="email" id="email" placeholder="📧 Email" required autocomplete="email">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="🔒 Password" required autocomplete="current-password">
        </div>
        <button type="submit" id="loginBtn">⚡ Log In ⚡</button>
    </form>

    <div class="signup-text">
        ✨ အကောင့်မရှိဘူးလား? <a href="sign.html">Sign Up</a> လုပ်ပါ။ ✨
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
        authDomain: "john-gaming-shop.firebaseapp.com",
        projectId: "john-gaming-shop",
        storageBucket: "john-gaming-shop.firebasestorage.app",
        messagingSenderId: "40810672889",
        appId: "1:40810672889:web:5661a8db077037b346e828",
        measurementId: "G-M8PLKW0P8L"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const ADMIN_EMAIL = "playeraung449@gmail.com";
    const ADMIN_PASSWORD = "Johnny2009";

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const toast = document.getElementById('toast');

    let isLoading = false;

    // Create floating particles
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 80; i++) {
            const span = document.createElement('span');
            const size = Math.random() * 4 + 1;
            span.style.width = `${size}px`;
            span.style.height = `${size}px`;
            span.style.left = `${Math.random() * 100}%`;
            span.style.animationDelay = `${Math.random() * 8}s`;
            span.style.animationDuration = `${Math.random() * 5 + 5}s`;
            span.style.background = `rgba(59, 130, 246, ${Math.random() * 0.5 + 0.2})`;
            container.appendChild(span);
        }
    }
    createParticles();

    function showToast(message, type = 'error') {
        toast.textContent = message;
        toast.className = `toast ${type} show`;
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    function setLoading(loading) {
        isLoading = loading;
        if (loading) {
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
        } else {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '⚡ Log In ⚡';
        }
    }

    function isAdmin(email, password) {
        return email === ADMIN_EMAIL && password === ADMIN_PASSWORD;
    }

    async function loginUser(email, password) {
        try {
            if (isAdmin(email, password)) {
                showToast("👑 Welcome Admin! Redirecting to Admin Panel...", 'success');
                setTimeout(() => {
                    window.location.href = "admin-panel.html";
                }, 1200);
                return;
            }

            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            showToast(`🎉 Welcome back, ${userCredential.user.email.split('@')[0]}! 🎉`, 'success');
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1200);

        } catch (error) {
            let errorMsg = "❌ Login failed! ";
            switch (error.code) {
                case 'auth/invalid-email':
                    errorMsg += "Invalid email format.";
                    break;
                case 'auth/user-not-found':
                    errorMsg += "No account found. Please Sign Up first.";
                    break;
                case 'auth/wrong-password':
                    errorMsg += "Incorrect password. Try again!";
                    break;
                default:
                    errorMsg += error.message;
            }
            showToast(errorMsg, 'error');
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (isLoading) return;

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
            showToast("⚠️ Please fill in all fields", 'error');
            return;
        }

        setLoading(true);
        await loginUser(email, password);
        setLoading(false);
    });
</script>
</body>
</html>
