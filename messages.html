<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>စကားဝိုင်း | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(15px);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid rgba(0, 255, 231, 0.3);
      z-index: 10;
    }
    .back-btn {
      background: rgba(0,255,231,0.15);
      border: 1px solid #00ffe7;
      border-radius: 40px;
      padding: 8px 18px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
    }
    .admin-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .admin-avatar {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .admin-details h3 {
      font-size: 1rem;
      margin-bottom: 2px;
    }
    .admin-details p {
      font-size: 0.7rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .online-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Messages Container */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* Message Bubbles */
    .message {
      display: flex;
      animation: fadeSlideUp 0.3s ease;
    }
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message.user {
      justify-content: flex-end;
    }
    .message.admin {
      justify-content: flex-start;
    }
    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .message.user .bubble {
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      color: black;
      border-bottom-right-radius: 4px;
    }
    .message.admin .bubble {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,255,231,0.2);
      color: white;
      border-bottom-left-radius: 4px;
    }
    .message-time {
      font-size: 0.6rem;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }

    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 25px;
      width: fit-content;
      margin-bottom: 10px;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #00ffe7;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* Input Area */
    .input-area {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(15px);
      padding: 15px 20px;
      display: flex;
      gap: 12px;
      border-top: 1px solid rgba(0, 255, 231, 0.3);
    }
    .input-area input {
      flex: 1;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(0,255,231,0.3);
      border-radius: 30px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .input-area input:focus {
      border-color: #00ffe7;
      box-shadow: 0 0 10px rgba(0,255,231,0.3);
    }
    .input-area input::placeholder {
      color: #64748b;
    }
    .send-btn {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      border: none;
      border-radius: 40px;
      padding: 0 25px;
      font-weight: bold;
      color: black;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .send-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(0,255,231,0.4);
    }
    .send-btn:disabled {
      opacity: 0.5;
      transform: none;
    }

    /* Welcome Message */
    .welcome-message {
      text-align: center;
      padding: 30px;
      color: #64748b;
    }

    /* Scrollbar */
    .messages-container::-webkit-scrollbar {
      width: 4px;
    }
    .messages-container::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }
    .messages-container::-webkit-scrollbar-thumb {
      background: #00ffe7;
      border-radius: 4px;
    }

    @media (max-width: 550px) {
      .bubble {
        max-width: 85%;
        font-size: 13px;
        padding: 10px 14px;
      }
      .send-btn {
        padding: 0 18px;
      }
    }
  </style>
</head>
<body>

<div class="chat-header">
  <button class="back-btn" onclick="goBack()">← နောက်သို့</button>
  <div class="admin-info">
    <div class="admin-avatar">👑</div>
    <div class="admin-details">
      <h3>John Gaming Shop Admin</h3>
      <p><span class="online-dot"></span> Online</p>
    </div>
  </div>
</div>

<div class="messages-container" id="messagesContainer">
  <div class="welcome-message">
    <p>✨ မင်္ဂလာပါ ✨</p>
    <p style="font-size: 12px;">သင့်ရဲ့ မေးမြန်းချက်များကို Admin ထံ တိုက်ရိုက်မေးမြန်းနိုင်ပါသည်</p>
  </div>
</div>

<div class="input-area">
  <input type="text" id="messageInput" placeholder="စာရိုက်ပါ..." autocomplete="off">
  <button class="send-btn" id="sendBtn">📤 ပို့ရန်</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp, query, limitToLast, set, onDisconnect, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const messagesContainer = document.getElementById('messagesContainer');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  let currentUser = null;
  let currentUID = null;
  let typingTimeout = null;

  // Admin ID (fixed - you can change this)
  const ADMIN_UID = "admin";
  const ADMIN_NAME = "John Gaming Shop Admin";

  function formatTime(timestamp) {
    if (!timestamp) return '';
    const date = new Date(timestamp);
    return date.toLocaleTimeString('my-MM', { hour: '2-digit', minute: '2-digit' });
  }

  function scrollToBottom() {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function addMessage(text, sender, senderName, timestamp, isOwn = false) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isOwn ? 'user' : 'admin'}`;
    
    const timeStr = formatTime(timestamp);
    
    messageDiv.innerHTML = `
      <div class="bubble">
        ${text}
        <div class="message-time">${timeStr}</div>
      </div>
    `;
    
    messagesContainer.appendChild(messageDiv);
    scrollToBottom();
  }

  // Listen for new messages
  function listenForMessages(userId) {
    const messagesRef = ref(db, `chat_messages/${userId}`);
    const messagesQuery = query(messagesRef, limitToLast(50));
    
    onChildAdded(messagesQuery, (snapshot) => {
      const msg = snapshot.val();
      if (msg) {
        const isOwn = msg.sender === currentUID;
        addMessage(msg.text, msg.sender, msg.senderName, msg.timestamp, isOwn);
      }
    });
  }

  // Send message
  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    if (!currentUser) {
      alert("အကောင့်ဝင်ထားရန် လိုအပ်ပါသည်");
      return;
    }

    sendBtn.disabled = true;
    
    const messagesRef = ref(db, `chat_messages/${currentUID}`);
    await push(messagesRef, {
      text: text,
      sender: currentUID,
      senderName: currentUser.email?.split('@')[0] || "User",
      timestamp: serverTimestamp(),
      read: false
    });
    
    messageInput.value = '';
    sendBtn.disabled = false;
    messageInput.focus();
  }

  // Handle enter key
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !sendBtn.disabled) {
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  window.goBack = () => {
    window.location.href = "index.html";
  };

  // Auth state
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      currentUID = user.uid;
      
      // Clear welcome message and start listening
      messagesContainer.innerHTML = '';
      listenForMessages(currentUID);
      
      // Add welcome message if no messages yet (optional)
      setTimeout(() => {
        if (messagesContainer.children.length === 0) {
          const welcomeDiv = document.createElement('div');
          welcomeDiv.className = 'welcome-message';
          welcomeDiv.innerHTML = `
            <p>✨ မင်္ဂလာပါ ${user.email?.split('@')[0] || 'User'} ✨</p>
            <p style="font-size: 12px;">Admin ထံ စာပို့နိုင်ပါပြီ။ ပြန်ကြားချက်ကို စောင့်ဆိုင်းပေးပါ။</p>
          `;
          messagesContainer.appendChild(welcomeDiv);
        }
      }, 500);
    } else {
      alert("ကျေးဇူးပြု၍ အကောင့်ဝင်ပါ");
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
