<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>အကောင့်ရောင်းဝယ်ရေး | John Gaming Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      padding-bottom: 40px;
      position: relative;
    }

    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 20px;
    }
    .header .icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
    }
    .header p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 5px;
    }

    /* Tab Menu */
    .tab-menu {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 25px;
    }
    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 40px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      color: black;
      border-color: transparent;
    }
    .tab-btn:hover:not(.active) {
      border-color: #00ffe7;
      color: #00ffe7;
    }

    /* Account Grid */
    .account-grid {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      max-width: 900px;
      margin: 0 auto;
    }

    .account-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 18px;
      border: 1px solid rgba(0, 255, 231, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .account-card:hover {
      transform: translateY(-5px);
      border-color: #00ffe7;
      background: rgba(0, 255, 231, 0.08);
      box-shadow: 0 10px 25px rgba(0,255,231,0.15);
    }

    .account-game {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .game-icon {
      font-size: 2rem;
    }
    .game-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: #00ffe7;
    }

    .account-details {
      margin-bottom: 12px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.8rem;
    }
    .detail-label {
      color: #94a3b8;
    }
    .detail-value {
      color: white;
      font-weight: 500;
    }

    .account-price {
      font-size: 1.2rem;
      font-weight: bold;
      color: #00ffe7;
      text-align: right;
      margin: 10px 0;
    }

    .buy-account-btn {
      width: 100%;
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      border: none;
      border-radius: 30px;
      padding: 10px;
      font-weight: bold;
      color: black;
      cursor: pointer;
      transition: all 0.2s;
    }
    .buy-account-btn:hover {
      transform: scale(1.02);
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: rgba(15, 25, 45, 0.98);
      border-radius: 32px;
      padding: 28px;
      width: 90%;
      max-width: 400px;
      border: 1px solid #00ffe7;
      animation: fadeScale 0.3s ease;
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-content h3 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      text-align: center;
      color: #00ffe7;
    }
    .modal-content p {
      margin: 8px 0;
      font-size: 0.9rem;
    }
    .modal-content input {
      width: 100%;
      padding: 12px 15px;
      margin: 8px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(0,255,231,0.3);
      border-radius: 30px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    .modal-content input:focus {
      border-color: #00ffe7;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn.buy {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      color: black;
    }
    .modal-btn.close {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .modal-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1100;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.error {
      border-color: #ef4444;
      background: rgba(220,38,38,0.9);
    }

    .loading {
      text-align: center;
      padding: 50px;
      color: #94a3b8;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,255,231,0.2);
      border-top-color: #00ffe7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .account-grid {
        grid-template-columns: 1fr;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">🔄</div>
  <h1>အကောင့်ရောင်းဝယ်ရေး</h1>
  <p>လုံခြုံစိတ်ချရသော ဂိမ်းအကောင့်များ ဝယ်ယူရောင်းချနိုင်သည်</p>
</div>

<div class="tab-menu">
  <button class="tab-btn active" data-tab="buy">🛒 ဝယ်ရန်</button>
  <button class="tab-btn" data-tab="sell">💰 ရောင်းရန်</button>
</div>

<div id="buySection" class="account-grid"></div>

<div id="sellSection" class="account-grid" style="display:none;">
  <div class="loading">
    <div class="spinner"></div>
    <p>အကောင့်များ ဖတ်နေသည်...</p>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle">🛒 အကောင့်ဝယ်ယူရန်</h3>
    <p id="modalGame">ဂိမ်း: -</p>
    <p id="modalPrice">စျေးနှုန်း: -</p>
    <p id="modalBalance">လက်ကျန်ငွေ: -</p>
    <input type="text" id="contactInfo" placeholder="ဆက်သွယ်ရန် Telegram/Phone">
    <div class="modal-buttons">
      <button class="modal-btn close" onclick="closeModal()">ပိတ်မယ်</button>
      <button class="modal-btn buy" id="buyModalBtn" onclick="confirmBuy()">အတည်ပြုဝယ်ယူမည်</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, get, update, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const TELEGRAM_BOT_TOKEN = "8653967411:AAFfw-0pR8RysuPD6aoSlZ7w7d8XNNs8l_A";
  const TELEGRAM_CHAT_ID = "6427719618";

  let currentUser = null;
  let currentBalance = 0;
  let selectedAccount = null;

  const toast = document.getElementById('toast');
  const modal = document.getElementById('modal');
  const modalTitle = document.getElementById('modalTitle');
  const modalGame = document.getElementById('modalGame');
  const modalPrice = document.getElementById('modalPrice');
  const modalBalance = document.getElementById('modalBalance');
  const contactInfoInput = document.getElementById('contactInfo');
  const buySection = document.getElementById('buySection');
  const sellSection = document.getElementById('sellSection');

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = isError ? 'toast error show' : 'toast show';
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => {
    window.location.href = "index.html";
  };

  async function sendTelegramNotification(userName, userId, accountInfo, price, contact, type) {
    const message = `🔄 အကောင့်ရောင်းဝယ်ရေး ${type === 'buy' ? 'ဝယ်ယူမှု' : 'ရောင်းချမှု'} 🔄\n\n━━━━━━━━━━━━━━━━━━━━\n👤 အမည်: ${userName}\n🆔 User ID: ${userId}\n🎮 ဂိမ်း: ${accountInfo.game}\n📋 အကောင့်အမည်: ${accountInfo.accountName}\n💰 စျေးနှုန်း: ${price.toLocaleString()} MMK\n📞 ဆက်သွယ်ရန်: ${contact}\n📌 အမျိုးအစား: ${type === 'buy' ? 'ဝယ်ယူခြင်း' : 'ရောင်းချခြင်း'}\n━━━━━━━━━━━━━━━━━━━━\n⏰ အချိန်: ${new Date().toLocaleString()}\n\n✅ ကျေးဇူးတင်ပါသည်။ Admin မှ ဆက်သွယ်ပေးပါမည်။`;
    
    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    try {
      await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message,
          parse_mode: 'HTML'
        })
      });
    } catch (err) {
      console.error("Telegram error:", err);
    }
  }

  function loadAccounts() {
    const accountsRef = ref(db, 'accounts');
    onValue(accountsRef, (snapshot) => {
      buySection.innerHTML = "";
      const accounts = [];
      snapshot.forEach((child) => {
        const acc = { id: child.key, ...child.val() };
        if (acc.status === 'available') {
          accounts.push(acc);
        }
      });
      
      if (accounts.length === 0) {
        buySection.innerHTML = '<div class="loading" style="grid-column:1/-1;"><div style="font-size:3rem; margin-bottom:10px;">📭</div><p>လက်ရှိဝယ်ယူရန်အကောင့်များ မရှိသေးပါ</p></div>';
        return;
      }
      
      accounts.forEach(acc => {
        const card = document.createElement('div');
        card.className = 'account-card';
        card.onclick = () => showBuyModal(acc);
        card.innerHTML = `
          <div class="account-game">
            <div class="game-icon">${acc.icon || '🎮'}</div>
            <div class="game-name">${acc.game}</div>
          </div>
          <div class="account-details">
            <div class="detail-row">
              <span class="detail-label">အကောင့်အမည်:</span>
              <span class="detail-value">${acc.accountName}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">အဆင့်/အကြောင်းအရာ:</span>
              <span class="detail-value">${acc.description || '-'}</span>
            </div>
          </div>
          <div class="account-price">${acc.price.toLocaleString()} Ks</div>
          <button class="buy-account-btn">🛒 ဝယ်ယူမည်</button>
        `;
        buySection.appendChild(card);
      });
    });
  }

  window.showBuyModal = (account) => {
    if (!currentUser) {
      showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်", true);
      return;
    }
    selectedAccount = account;
    contactInfoInput.value = "";
    modalTitle.innerText = "🛒 အကောင့်ဝယ်ယူရန်";
    modalGame.innerText = `ဂိမ်း: ${account.game}`;
    modalPrice.innerText = `စျေးနှုန်း: ${account.price.toLocaleString()} Ks`;
    modalBalance.innerText = `လက်ကျန်ငွေ: ${currentBalance.toLocaleString()} Ks`;
    modal.classList.add('show');
  };

  window.confirmBuy = async () => {
    if (!currentUser) return;
    if (!selectedAccount) return;
    
    const contact = contactInfoInput.value.trim();
    if (!contact) {
      showToast("ဆက်သွယ်ရန် Telegram/ဖုန်းနံပါတ် ထည့်ပါ", true);
      return;
    }
    
    if (currentBalance < selectedAccount.price) {
      showToast("လက်ကျန်ငွေ မလုံလောက်ပါ", true);
      return;
    }
    
    const buyBtn = document.getElementById('buyModalBtn');
    buyBtn.disabled = true;
    buyBtn.innerText = "လုပ်ဆောင်နေသည်...";
    
    try {
      const userRef = ref(db, `users/${currentUser.uid}`);
      const newBalance = currentBalance - selectedAccount.price;
      await update(userRef, { balance: newBalance });
      
      const accountRef = ref(db, `accounts/${selectedAccount.id}`);
      await update(accountRef, { 
        status: 'sold',
        buyerUid: currentUser.uid,
        buyerContact: contact,
        soldAt: Date.now()
      });
      
      const orderRef = push(ref(db, `orders/${currentUser.uid}`));
      await set(orderRef, {
        type: "AccountPurchase",
        product: `${selectedAccount.game} အကောင့် - ${selectedAccount.accountName}`,
        price: selectedAccount.price,
        accountId: selectedAccount.id,
        contact: contact,
        status: "pending",
        timestamp: Date.now(),
        date: new Date().toLocaleString()
      });
      
      const userName = currentUser.email?.split('@')[0] || "User";
      await sendTelegramNotification(userName, currentUser.uid, selectedAccount, selectedAccount.price, contact, 'buy');
      
      showToast(`✅ အကောင့်ဝယ်ယူမှုအောင်မြင်ပါသည်! Admin မှ ဆက်သွယ်ပေးပါမည်။`);
      
      currentBalance = newBalance;
      
      closeModal();
    } catch (err) {
      showToast("ဝယ်ယူမှုမအောင်မြင်ပါ: " + err.message, true);
    } finally {
      buyBtn.disabled = false;
      buyBtn.innerText = "အတည်ပြုဝယ်ယူမည်";
    }
  };

  window.closeModal = () => {
    modal.classList.remove('show');
    selectedAccount = null;
    contactInfoInput.value = "";
  };

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('buySection').style.display = tab === 'buy' ? 'grid' : 'none';
      document.getElementById('sellSection').style.display = tab === 'sell' ? 'grid' : 'none';
      if (tab === 'sell') {
        loadSellSection();
      }
    });
  });

  function loadSellSection() {
    if (!currentUser) return;
    sellSection.innerHTML = `
      <div class="account-card" style="grid-column:1/-1; text-align:center;">
        <div style="font-size:2rem; margin-bottom:10px;">📝</div>
        <h3 style="margin-bottom:10px;">အကောင့်ရောင်းရန်</h3>
        <p style="color:#94a3b8; margin-bottom:15px;">သင့်အကောင့်ကို ရောင်းချလိုပါက Admin ကိုဆက်သွယ်ပါ</p>
        <button onclick="window.location.href='owner.html'" style="background:linear-gradient(90deg,#00ffe7,#3b82f6); border:none; border-radius:30px; padding:10px 25px; font-weight:bold; cursor:pointer;">👑 Admin သို့ဆက်သွယ်ရန်</button>
      </div>
    `;
  }

  async function loadUserData(uid) {
    const userRef = ref(db, `users/${uid}`);
    const snapshot = await get(userRef);
    if (snapshot.exists()) {
      currentBalance = snapshot.val().balance || 0;
    }
  }

  loadAccounts();

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
    } else {
      window.location.href = "login.html";
    }
