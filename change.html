<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>စကားဝှက်ပြောင်းရန် | John Gaming Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      padding-bottom: 40px;
      position: relative;
    }

    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 30px;
    }
    .header .icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
    }
    .header p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 5px;
    }

    .form-container {
      position: relative;
      z-index: 10;
      max-width: 400px;
      margin: 0 auto;
    }

    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(0,255,231,0.3);
      border-radius: 30px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }
    .input-group input:focus {
      border-color: #00ffe7;
      box-shadow: 0 0 12px rgba(0,255,231,0.3);
    }
    .input-group input::placeholder {
      color: #64748b;
    }

    .password-strength {
      margin-top: 6px;
      font-size: 0.7rem;
      padding-left: 15px;
    }
    .strength-weak { color: #ef4444; }
    .strength-medium { color: #f59e0b; }
    .strength-strong { color: #10b981; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: bold;
      color: black;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(0,255,231,0.5);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid black;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .info-card {
      background: rgba(0, 255, 231, 0.08);
      border-radius: 20px;
      padding: 15px;
      margin-top: 25px;
      text-align: center;
      border: 1px solid rgba(0,255,231,0.2);
    }
    .info-card p {
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .info-card a {
      color: #00ffe7;
      text-decoration: none;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1100;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.error {
      border-color: #ef4444;
      background: rgba(220,38,38,0.9);
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">🔐</div>
  <h1>စကားဝှက်ပြောင်းရန်</h1>
  <p>လုံခြုံရေးအတွက် စကားဝှက်ကို ပုံမှန်ပြောင်းလဲပါ</p>
</div>

<div class="form-container">
  <div class="input-group">
    <label>လက်ရှိစကားဝှက်</label>
    <input type="password" id="currentPassword" placeholder="လက်ရှိစကားဝှက်ထည့်ပါ">
  </div>

  <div class="input-group">
    <label>စကားဝှက်အသစ်</label>
    <input type="password" id="newPassword" placeholder="စကားဝှက်အသစ်ထည့်ပါ (အနည်းဆုံး 6 လုံး)">
    <div class="password-strength" id="passwordStrength"></div>
  </div>

  <div class="input-group">
    <label>စကားဝှက်အသစ် အတည်ပြုရန်</label>
    <input type="password" id="confirmPassword" placeholder="စကားဝှက်အသစ် ထပ်ရိုက်ပါ">
  </div>

  <button class="submit-btn" id="changeBtn" onclick="changePassword()">
    🔄 စကားဝှက်ပြောင်းမည်
  </button>

  <div class="info-card">
    <p>💡 စကားဝှက်သည် အနည်းဆုံး 6 လုံးရှိရပါမည်။</p>
    <p>📧 စကားဝှက်မေ့သွားပါက <a href="owner.html">Admin ကိုဆက်သွယ်ပါ</a></p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let currentUser = null;

  const toast = document.getElementById('toast');
  const currentPasswordInput = document.getElementById('currentPassword');
  const newPasswordInput = document.getElementById('newPassword');
  const confirmPasswordInput = document.getElementById('confirmPassword');
  const changeBtn = document.getElementById('changeBtn');
  const passwordStrengthDiv = document.getElementById('passwordStrength');

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = isError ? 'toast error show' : 'toast show';
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  function checkPasswordStrength(password) {
    if (password.length === 0) {
      passwordStrengthDiv.innerHTML = '';
      return;
    }
    if (password.length < 6) {
      passwordStrengthDiv.innerHTML = '🔴 အားနည်းသည် (အနည်းဆုံး 6 လုံး)';
      passwordStrengthDiv.className = 'password-strength strength-weak';
    } else if (password.length >= 6 && password.length < 10) {
      passwordStrengthDiv.innerHTML = '🟡 အလယ်အလတ်';
      passwordStrengthDiv.className = 'password-strength strength-medium';
    } else {
      passwordStrengthDiv.innerHTML = '🟢 အားကောင်းသည်';
      passwordStrengthDiv.className = 'password-strength strength-strong';
    }
  }

  newPasswordInput.addEventListener('input', (e) => {
    checkPasswordStrength(e.target.value);
  });

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => {
    window.location.href = "home.html";
  };

  window.changePassword = async () => {
    if (!currentUser) {
      showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်", true);
      window.location.href = "login.html";
      return;
    }

    const currentPassword = currentPasswordInput.value.trim();
    const newPassword = newPasswordInput.value;
    const confirmPassword = confirmPasswordInput.value;

    if (!currentPassword) {
      showToast("လက်ရှိစကားဝှက်ထည့်ပါ", true);
      return;
    }

    if (newPassword.length < 6) {
      showToast("စကားဝှက်အသစ်သည် အနည်းဆုံး 6 လုံးရှိရပါမယ်", true);
      return;
    }

    if (newPassword !== confirmPassword) {
      showToast("စကားဝှက်အသစ်နှင့် အတည်ပြုစကားဝှက် မတူပါ", true);
      return;
    }

    changeBtn.disabled = true;
    changeBtn.innerHTML = '<span class="spinner"></span> ပြောင်းလဲနေသည်...';

    try {
      const credential = EmailAuthProvider.credential(currentUser.email, currentPassword);
      await reauthenticateWithCredential(currentUser, credential);
      await updatePassword(currentUser, newPassword);

      showToast("✅ စကားဝှက်ပြောင်းလဲမှု အောင်မြင်ပါသည်!");
      
      currentPasswordInput.value = "";
      newPasswordInput.value = "";
      confirmPasswordInput.value = "";
      passwordStrengthDiv.innerHTML = "";

      setTimeout(() => {
        window.location.href = "home.html";
      }, 2000);

    } catch (error) {
      let errorMsg = "စကားဝှက်ပြောင်းလဲမှု မအောင်မြင်ပါ။ ";
      switch (error.code) {
        case 'auth/wrong-password':
          errorMsg += "လက်ရှိစကားဝှက် မှားယွင်းနေပါသည်။";
          break;
        case 'auth/weak-password':
          errorMsg += "စကားဝှက်အားနည်းလွန်းပါသည်။";
          break;
        case 'auth/requires-recent-login':
          errorMsg += "ကျေးဇူးပြု၍ ပြန်လည်ဝင်ရောက်ပြီးမှ ပြောင်းလဲပါ။";
          break;
        default:
          errorMsg += error.message;
      }
      showToast(errorMsg, true);
    } finally {
      changeBtn.disabled = false;
      changeBtn.innerHTML = '🔄 စကားဝှက်ပြောင်းမည်';
    }
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
    } else {
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
