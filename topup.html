<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>ငွေဖြည့်ရန် | John Gaming Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      padding-bottom: 40px;
      position: relative;
    }

    /* Animated particles */
    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    /* Glowing orbs */
    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    /* Header */
    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 30px;
    }
    .header .icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
    }

    /* Section Title */
    .section-title {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 25px 0 15px;
      font-size: 1.1rem;
      color: #94a3b8;
    }

    /* Payment Grid */
    .payment-grid {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Payment Card */
    .payment-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 18px;
      border: 1px solid rgba(0, 255, 231, 0.2);
      transition: all 0.3s ease;
    }
    .payment-card:hover {
      transform: translateY(-5px);
      border-color: #00ffe7;
      box-shadow: 0 10px 25px rgba(0, 255, 231, 0.15);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }
    .card-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: black;
    }
    .card-header h3 {
      font-size: 1.2rem;
      color: #00ffe7;
    }
    .account-details {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .account-details p {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .account-details .label {
      color: #94a3b8;
    }
    .account-details .value {
      font-weight: 600;
      color: white;
      font-family: monospace;
    }
    .copy-btn {
      background: rgba(0, 255, 231, 0.15);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #00ffe7;
    }
    .copy-btn:hover {
      background: #00ffe7;
      color: black;
    }

    /* Amount Input */
    .amount-section {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 20px 25px;
      max-width: 500px;
      margin: 20px auto 0;
      text-align: center;
      border: 1px solid rgba(0, 255, 231, 0.2);
    }
    .amount-section h3 {
      margin-bottom: 15px;
      color: #00ffe7;
    }
    .amount-input {
      background: rgba(255,255,255,0.1);
      border: 1px solid #00ffe7;
      border-radius: 40px;
      padding: 14px 20px;
      color: white;
      font-size: 1rem;
      width: 80%;
      text-align: center;
      outline: none;
    }
    .amount-input:focus {
      box-shadow: 0 0 15px rgba(0,255,231,0.3);
    }

    /* Upload Section */
    .upload-section {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 25px;
      max-width: 500px;
      margin: 20px auto 0;
      text-align: center;
      border: 1px solid rgba(0, 255, 231, 0.2);
    }
    .upload-section h3 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      color: #00ffe7;
    }
    .upload-area {
      border: 2px dashed rgba(0, 255, 231, 0.4);
      border-radius: 20px;
      padding: 25px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover {
      border-color: #00ffe7;
      background: rgba(0, 255, 231, 0.05);
    }
    .upload-area .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .upload-area p {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    #fileInput {
      display: none;
    }
    .file-name {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #00ffe7;
    }

    /* Submit Button */
    .submit-btn {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      border: none;
      border-radius: 50px;
      padding: 14px 35px;
      font-weight: bold;
      color: black;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .submit-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 255, 231, 0.5);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Loading Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid black;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.error {
      border-color: #ef4444;
      background: rgba(220,38,38,0.9);
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">💳</div>
  <h1>ငွေဖြည့်ရန်</h1>
</div>

<div class="section-title">
  <span>🏦</span> ငွေလွှဲရန်အကောင့်များ <span>🏦</span>
</div>

<div class="payment-grid" id="paymentGrid"></div>

<!-- Amount Input -->
<div class="amount-section">
  <h3>💰 ဖြည့်မည့်ငွေပမာဏ</h3>
  <input type="number" id="amountInput" class="amount-input" placeholder="ငွေပမာဏထည့်ပါ" min="1000" step="1000">
</div>

<!-- Upload Section -->
<div class="upload-section">
  <h3>
    <span>📸</span>
    ငွေပေးချေမှု ဓာတ်ပုံ
  </h3>
  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📤</div>
    <p>ဓာတ်ပုံနှိပ်၍ ရွေးချယ်ပါ</p>
    <p style="font-size: 11px;">(Slip/Screenshot ဓာတ်ပုံ)</p>
  </div>
  <input type="file" id="fileInput" accept="image/*">
  <div class="file-name" id="fileName"></div>
  
  <button class="submit-btn" id="submitBtn" onclick="submitPayment()">
    💸 ငွေဖြည့်ရန် 💸
  </button>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  // Telegram Config
  const TELEGRAM_BOT_TOKEN = "8653967411:AAFfw-0pR8RysuPD6aoSlZ7w7d8XNNs8l_A";
  const TELEGRAM_CHAT_ID = "6427719618";

  const toast = document.getElementById('toast');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');
  const paymentGrid = document.getElementById('paymentGrid');
  const amountInput = document.getElementById('amountInput');

  let selectedFile = null;
  let currentUser = null;

  // Payment accounts data
  const accounts = [
    { bank: "KBZ", phone: "09426012797", name: "Aung Zaw Myint", icon: "🏦" },
    { bank: "KBZ", phone: "09680844955", name: "Thet Aung", icon: "🏦" },
    { bank: "Wave Money", phone: "09792328651", name: "Htay Htay Hlaing", icon: "📱" },
    { bank: "Wave Money", phone: "09680844955", name: "Thet Aung", icon: "📱" }
  ];

  function showToast(message, isError = false) {
    toast.textContent = message;
    toast.className = isError ? 'toast error show' : 'toast show';
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  function copyPhone(phone) {
    navigator.clipboard.writeText(phone);
    showToast(`✅ ${phone} ကို ကူးယူပြီးပါပြီ`);
  }

  // Send Telegram notification
  async function sendTelegramNotification(userName, userId, amount, imageUrl) {
    const message = `🆕 **New Payment Request!**\n\n👤 **User:** ${userName}\n🆔 **UID:** ${userId}\n💰 **Amount:** ${amount} Ks\n📸 **Slip:** [View Image](${imageUrl})\n\n⏰ **Time:** ${new Date().toLocaleString()}\n\n🔗 **Approve in Admin Panel**`;
    
    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    
    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message,
          parse_mode: 'Markdown',
          disable_web_page_preview: false
        })
      });
      const result = await response.json();
      if (!result.ok) {
        console.error("Telegram error:", result);
      }
    } catch (error) {
      console.error("Failed to send Telegram notification:", error);
    }
  }

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  // Render payment cards
  function renderPaymentCards() {
    paymentGrid.innerHTML = accounts.map((acc, index) => `
      <div class="payment-card">
        <div class="card-header">
          <div class="card-icon">${acc.icon}</div>
          <h3>${acc.bank}</h3>
        </div>
        <div class="account-details">
          <p>
            <span class="label">📞 ဖုန်းနံပါတ်:</span>
            <span class="value">${acc.phone}</span>
            <button class="copy-btn" onclick="window.copyPhone('${acc.phone}')">Copy</button>
          </p>
          <p>
            <span class="label">👤 အမည်:</span>
            <span class="value">${acc.name}</span>
          </p>
        </div>
      </div>
    `).join('');
  }

  window.copyPhone = copyPhone;

  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      selectedFile = e.target.files[0];
      fileName.innerHTML = `✅ ရွေးထားသောဖိုင်: ${selectedFile.name}`;
      fileName.style.color = "#00ffe7";
    } else {
      selectedFile = null;
      fileName.innerHTML = "";
    }
  });

  async function submitPayment() {
    if (!currentUser) {
      showToast("❌ အကောင့်ဝင်ထားရန် လိုအပ်ပါသည်", true);
      window.location.href = "login.html";
      return;
    }

    const amount = parseInt(amountInput.value);
    if (!amount || amount < 1000) {
      showToast("❌ ကျေးဇူးပြု၍ ငွေပမာဏကို အနည်းဆုံး 1000Ks ထည့်ပါ", true);
      return;
    }

    if (!selectedFile) {
      showToast("❌ ကျေးဇူးပြု၍ ငွေပေးချေမှု ဓာတ်ပုံကို ရွေးချယ်ပါ", true);
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> ပို့နေသည်...';

    try {
      const uid = currentUser.uid;
      const userName = currentUser.email?.split('@')[0] || "User";
      const timestamp = Date.now();
      const fileRef = storageRef(storage, `payments/${uid}/${timestamp}_${selectedFile.name}`);
      
      await uploadBytes(fileRef, selectedFile);
      const imageUrl = await getDownloadURL(fileRef);
      
      await push(ref(db, `paymentRequests/${uid}`), {
        imageUrl: imageUrl,
        timestamp: timestamp,
        status: "pending",
        userName: userName,
        amount: amount
      });

      // Send Telegram notification
      await sendTelegramNotification(userName, uid, amount, imageUrl);

      showToast("✅ ငွေဖြည့် request တင်ပြီးပါပြီ! Admin အတည်ပြုချက်ကို စောင့်ဆိုင်းပါ");
      
      // Reset form
      selectedFile = null;
      fileInput.value = '';
      fileName.innerHTML = '';
      amountInput.value = '';
      
      setTimeout(() => {
        window.location.href = "home.html";
      }, 2000);
      
    } catch (error) {
      console.error("Payment error:", error);
      showToast("❌ ငွေဖြည့်ခြင်း မအောင်မြင်ပါ: " + error.message, true);
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '💸 ငွေဖြည့်ရန် 💸';
    }
  }

  window.submitPayment = submitPayment;
  window.goBack = () => { window.location.href = "payment.html"; };

  renderPaymentCards();

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
    } else {
      showToast("ကျေးဇူးပြု၍ အကောင့်ဝင်ပါ", true);
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    }
  });
</script>

</body>
</html>
