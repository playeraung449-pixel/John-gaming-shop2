<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MLBB Diamond | John Gaming Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      padding-bottom: 40px;
      position: relative;
    }

    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 20px;
    }
    .header .icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
    }
    .header p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 5px;
    }

    .balance-card {
      position: relative;
      z-index: 10;
      background: rgba(0, 255, 231, 0.1);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 12px 20px;
      max-width: 280px;
      margin: 0 auto 20px auto;
      text-align: center;
      border: 1px solid rgba(0,255,231,0.3);
    }
    .balance-label {
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .balance-amount {
      font-size: 1.5rem;
      font-weight: bold;
      color: #00ffe7;
    }

    /* Tab Menu */
    .tab-menu {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      color: black;
      border-color: transparent;
    }
    .tab-btn:hover:not(.active) {
      border-color: #00ffe7;
      color: #00ffe7;
    }

    /* Product Grid */
    .product-grid {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      max-width: 700px;
      margin: 0 auto;
    }
    .product-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 16px 10px;
      text-align: center;
      border: 1px solid rgba(0, 255, 231, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: #00ffe7;
      background: rgba(0, 255, 231, 0.08);
      box-shadow: 0 10px 25px rgba(0,255,231,0.15);
    }
    .product-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .product-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .product-price {
      font-size: 0.8rem;
      color: #00ffe7;
      font-weight: bold;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: rgba(15, 25, 45, 0.98);
      border-radius: 32px;
      padding: 28px;
      width: 90%;
      max-width: 380px;
      border: 1px solid #00ffe7;
      animation: fadeScale 0.3s ease;
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-content h3 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      text-align: center;
      color: #00ffe7;
    }
    .modal-content p {
      margin: 8px 0;
      font-size: 0.9rem;
    }
    .modal-content input {
      width: 100%;
      padding: 12px 15px;
      margin: 8px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(0,255,231,0.3);
      border-radius: 30px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    .modal-content input:focus {
      border-color: #00ffe7;
    }
    .verify-status {
      font-size: 0.8rem;
      margin: 5px 0;
      padding: 5px 10px;
      border-radius: 20px;
      text-align: center;
    }
    .status-valid { background: rgba(16,185,129,0.2); color: #10b981; }
    .status-invalid { background: rgba(220,38,38,0.2); color: #ef4444; }
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn.buy {
      background: linear-gradient(90deg, #00ffe7, #3b82f6);
      color: black;
    }
    .modal-btn.close {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .modal-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .loading-text {
      text-align: center;
      margin: 10px 0;
      color: #f59e0b;
    }

    .history-link {
      position: relative;
      z-index: 10;
      display: block;
      text-align: center;
      margin-top: 30px;
    }
    .history-link button {
      background: rgba(0,255,231,0.15);
      border: 1px solid #00ffe7;
      border-radius: 40px;
      padding: 10px 25px;
      color: #00ffe7;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .history-link button:hover {
      background: #00ffe7;
      color: black;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1100;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.error {
      border-color: #ef4444;
      background: rgba(220,38,38,0.9);
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .product-card {
        padding: 12px 6px;
      }
      .product-name {
        font-size: 0.8rem;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
      .tab-btn {
        padding: 6px 14px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>

    { name: "၃၄၃ ဒိုင်မွန်း", price: 18900, icon: "💎" },
    { name: "၄၂၉ ဒိုင်မွန်း", price: 23700, icon: "💎" },
    { name: "၅၁၅ ဒိုင်မွန်း", price: 28600, icon: "💎" },
    { name: "၆၀၃ ဒိုင်မွန်း", price: 33000, icon: "💎" },
    { name: "၇၀၆ ဒိုင်မွန်း", price: 37200, icon: "💎" },
    { name: "၉၆၃ ဒိုင်မွန်း", price: 48600, icon: "💎" },
    { name: "၁၀၄၉ ဒိုင်မွန်း", price: 52500, icon: "💎" },
    { name: "၁၁၅၆ ဒိုင်မွန်း", price: 57600, icon: "💎" },
    { name: "၂၈၉၈ ဒိုင်မွန်း", price: 289840, icon: "💎" },
    { name: "၄၇၂၅ ဒိုင်မွန်း", price: 472580, icon: "💎" }
  ];

  let currentUser = null;
  let currentBalance = 0;
  let selectedProduct = null;
  let isAccountValid = false;
  let verifiedAccountName = "";

  const toast = document.getElementById('toast');
  const modal = document.getElementById('modal');
  const balanceSpan = document.getElementById('balance');
  const modalProduct = document.getElementById('modalProduct');
  const modalPrice = document.getElementById('modalPrice');
  const modalBalance = document.getElementById('modalBalance');
  const mlbbIdInput = document.getElementById('mlbbId');
  const serverIdInput = document.getElementById('serverId');
  const verifyStatus = document.getElementById('verifyStatus');
  const verifyLoading = document.getElementById('verifyLoading');
  const buyBtn = document.getElementById('buyBtn');

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = isError ? 'toast error show' : 'toast show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => {
    window.location.href = "game.html";
  };

  async function sendTelegramNotification(userName, userId, productName, price, mlbbId, serverId, accountName, orderId) {
    const message = `🎮 MLBB Diamond အသစ်ဝယ်ယူမှု 🎮\n\n━━━━━━━━━━━━━━━━━━━━\n👤 အမည်: ${userName}\n🆔 User ID: ${userId}\n🎮 MLBB ID: ${mlbbId}\n🌐 Server ID: ${serverId}\n👤 အကောင့်နာမည်: ${accountName}\n💎 ပစ္စည်း: ${productName}\n💰 ကျသင့်ငွေ: ${price.toLocaleString()} MMK\n📋 Order ID: ${orderId}\n📌 Status: ဆိုင်းငံ့ (Pending)\n━━━━━━━━━━━━━━━━━━━━\n⏰ ဝယ်ယူချိန်: ${new Date().toLocaleString()}\n\n✅ ကျေးဇူးတင်ပါသည်။ Admin အတည်ပြုချက်ကို စောင့်ဆိုင်းပါ။`;
    
    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    try {
      await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message,
          parse_mode: 'HTML'
        })
      });
    } catch (err) {
      console.error("Telegram error:", err);
    }
  }

  function renderProductGrid(containerId, products) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    products.forEach(product => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.onclick = () => showProduct(product);
      card.innerHTML = `
        <div class="product-icon">${product.icon}</div>
        <div class="product-name">${product.name}</div>
        <div class="product-price">${product.price.toLocaleString()} Ks</div>
      `;
      container.appendChild(card);
    });
  }

  window.showProduct = (product) => {
    if (!currentUser) {
      showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်", true);
      return;
    }
    selectedProduct = product;
    isAccountValid = false;
    verifiedAccountName = "";
    buyBtn.disabled = true;
    mlbbIdInput.value = localStorage.getItem("mlbbId") || "";
    serverIdInput.value = localStorage.getItem("serverId") || "";
    verifyStatus.innerHTML = "";
    verifyStatus.className = "verify-status";
    
    modalProduct.innerText = `ပစ္စည်း: ${product.name}`;
    modalPrice.innerText = `ကျသင့်ငွေ: ${product.price.toLocaleString()} Ks`;
    modalBalance.innerText = `လက်ကျန်ငွေ: ${currentBalance.toLocaleString()} Ks`;
    modal.classList.add('show');
  };

  window.verifyAccount = () => {
    const mlbbId = mlbbIdInput.value.trim();
    const serverId = serverIdInput.value.trim();
    
    if (!mlbbId || !serverId) {
      showToast("MLBB အိုင်ဒီ နှင့် ဆာဗာအိုင်ဒီ ထည့်ပါ", true);
      return;
    }
    
    verifyLoading.style.display = "block";
    verifyStatus.innerHTML = "";
    
    setTimeout(() => {
      verifyLoading.style.display = "none";
      isAccountValid = true;
      verifiedAccountName = `MLBB_${mlbbId}`;
      verifyStatus.innerHTML = `✅ အကောင့်နာမည်: ${verifiedAccountName}`;
      verifyStatus.className = "verify-status status-valid";
      buyBtn.disabled = false;
      localStorage.setItem("mlbbId", mlbbId);
      localStorage.setItem("serverId", serverId);
    }, 1000);
  };

  window.buyProduct = async () => {
    if (!currentUser) return;
    if (!isAccountValid) {
      showToast("အကောင့်ကို ဦးစွာစစ်ဆေးပါ", true);
      return;
    }
    
    const mlbbId = mlbbIdInput.value.trim();
    const serverId = serverIdInput.value.trim();
    
    if (currentBalance < selectedProduct.price) {
      showToast("လက်ကျန်ငွေ မလုံလောက်ပါ", true);
      return;
    }
    
    buyBtn.disabled = true;
    buyBtn.innerText = "လုပ်ဆောင်နေသည်...";
    
    try {
      const userRef = ref(db, `users/${currentUser.uid}`);
      const newBalance = currentBalance - selectedProduct.price;
      await update(userRef, { balance: newBalance });
      
      const newOrderRef = push(ref(db, `orders/${currentUser.uid}`));
      const orderId = newOrderRef.key;
      
      const orderData = {
        type: "MLBB_Diamond",
        product: selectedProduct.name,
        amount: selectedProduct.name,
        price: selectedProduct.price,
        mlbbId: mlbbId,
        serverId: serverId,
        accountName: verifiedAccountName,
        status: "pending",
        timestamp: Date.now(),
        date: new Date().toLocaleString()
      };
      await set(newOrderRef, orderData);
      
      const userName = currentUser.email?.split('@')[0] || "User";
      await sendTelegramNotification(userName, currentUser.uid, selectedProduct.name, selectedProduct.price, mlbbId, serverId, verifiedAccountName, orderId);
      
      showToast(`✅ ဝယ်ယူမှုအောင်မြင်ပါသည်! Order ID: ${orderId.substring(0,8)}... (Admin အတည်ပြုချက်ကို စောင့်ဆိုင်းပါ)`);
      
      currentBalance = newBalance;
      balanceSpan.innerText = `${currentBalance.toLocaleString()} Ks`;
      
      closeModal();
    } catch (err) {
      showToast("ဝယ်ယူမှုမအောင်မြင်ပါ: " + err.message, true);
    } finally {
      buyBtn.disabled = false;
      buyBtn.innerText = "ဝယ်ယူမည်";
    }
  };

  window.closeModal = () => {
    modal.classList.remove('show');
    verifyStatus.innerHTML = "";
    isAccountValid = false;
    buyBtn.disabled = true;
  };

  async function loadUserData(uid) {
    const userRef = ref(db, `users/${uid}`);
    const snapshot = await get(userRef);
    if (snapshot.exists()) {
      currentBalance = snapshot.val().balance || 0;
      balanceSpan.innerText = `${currentBalance.toLocaleString()} Ks`;
    }
  }

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('passGrid').style.display = tab === 'pass' ? 'grid' : 'none';
      document.getElementById('doubleGrid').style.display = tab === 'double' ? 'grid' : 'none';
      document.getElementById('diamondGrid').style.display = tab === 'diamond' ? 'grid' : 'none';
    });
  });

  renderProductGrid('passGrid', passProducts);
  renderProductGrid('doubleGrid', doubleProducts);
  renderProductGrid('diamondGrid', diamondProducts);

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
    } else {
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
