<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>အသိပေးချက်များ | John Gaming Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
      padding-top: 80px;
      padding-bottom: 40px;
      position: relative;
    }

    .particle {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 231, 0.4);
      border-radius: 50%;
      animation: floatParticle 10s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .glow-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,255,231,0.1), transparent);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 14s infinite alternate;
    }
    .glow-orb:nth-child(2) {
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent);
      animation-duration: 18s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.2); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 255, 231, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 231, 0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: bold;
      color: #00ffe7;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #00ffe7;
      color: black;
      transform: translateX(-3px);
      box-shadow: 0 0 15px rgba(0,255,231,0.5);
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 20px;
    }
    .header .icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(0,255,231,0.5));
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00ffe7, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
    }
    .header p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 5px;
    }

    /* Notice Container */
    .notice-container {
      position: relative;
      z-index: 10;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Notice Card */
    .notice-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(0, 255, 231, 0.2);
      transition: all 0.3s ease;
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .notice-card:hover {
      transform: translateX(5px);
      border-color: #00ffe7;
      background: rgba(0, 255, 231, 0.05);
    }

    .notice-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .notice-icon {
      font-size: 1.8rem;
    }
    .notice-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #00ffe7;
    }
    .notice-date {
      margin-left: auto;
      font-size: 0.7rem;
      color: #64748b;
    }
    .notice-content {
      font-size: 0.9rem;
      color: #e2e8f0;
      line-height: 1.5;
      padding-left: 10px;
      border-left: 3px solid rgba(0,255,231,0.3);
    }
    .notice-badge {
      display: inline-block;
      background: rgba(0,255,231,0.15);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.7rem;
      margin-top: 10px;
      color: #00ffe7;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 50px;
      color: #94a3b8;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,255,231,0.2);
      border-top-color: #00ffe7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 30px;
      border: 1px dashed rgba(0,255,231,0.3);
    }
    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 15px;
      opacity: 0.6;
    }
    .empty-state p {
      color: #64748b;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1100;
      white-space: nowrap;
      border: 1px solid #00ffe7;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.error {
      border-color: #ef4444;
      background: rgba(220,38,38,0.9);
    }

    @media (max-width: 550px) {
      body {
        padding: 15px;
        padding-top: 70px;
      }
      .notice-header {
        flex-wrap: wrap;
      }
      .notice-date {
        margin-left: 0;
        width: 100%;
      }
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

<div class="particle" id="particles"></div>
<div class="glow-orb"></div>
<div class="glow-orb"></div>

<button class="back-btn" onclick="goBack()">← နောက်သို့</button>

<div class="header">
  <div class="icon">📢</div>
  <h1>အသိပေးချက်များ</h1>
  <p>ဂိမ်းဆိုင်မှ အရေးကြီးသတင်းများ</p>
</div>

<div class="notice-container" id="noticeContainer">
  <div class="loading">
    <div class="spinner"></div>
    <p>အသိပေးချက်များ ဖတ်နေသည်...</p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, onValue, orderByChild, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRIyvljXaZV1keVpvBrTXiLszza_iJMD0",
    authDomain: "john-gaming-shop.firebaseapp.com",
    projectId: "john-gaming-shop",
    storageBucket: "john-gaming-shop.firebasestorage.app",
    messagingSenderId: "40810672889",
    appId: "1:40810672889:web:5661a8db077037b346e828",
    measurementId: "G-M8PLKW0P8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const noticeContainer = document.getElementById('noticeContainer');
  const toast = document.getElementById('toast');

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = isError ? 'toast error show' : 'toast show';
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 1;
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${Math.random() * 100}%`;
      span.style.animationDelay = `${Math.random() * 10}s`;
      span.style.animationDuration = `${Math.random() * 6 + 6}s`;
      container.appendChild(span);
    }
  }
  createParticles();

  window.goBack = () => {
    window.location.href = "index.html";
  };

  function formatDate(timestamp) {
    if (!timestamp) return "ရက်စွဲမရှိ";
    const date = new Date(timestamp);
    return date.toLocaleDateString('my-MM') + ' ' + date.toLocaleTimeString('my-MM', { hour: '2-digit', minute: '2-digit' });
  }

  function getNoticeIcon(type) {
    switch(type) {
      case 'announcement': return '📢';
      case 'warning': return '⚠️';
      case 'promotion': return '🎉';
      case 'update': return '🔄';
      case 'event': return '🎪';
      default: return '📌';
    }
  }

  function loadNotices() {
    const noticesRef = ref(db, 'notifications');
    const noticesQuery = query(noticesRef, orderByChild('timestamp'), limitToLast(30));
    
    onValue(noticesQuery, (snapshot) => {
      noticeContainer.innerHTML = "";
      
      const notices = [];
      snapshot.forEach((child) => {
        notices.push({ id: child.key, ...child.val() });
      });
      
      if (notices.length === 0) {
        noticeContainer.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <p>အသိပေးချက်များ မရှိသေးပါ</p>
            <p style="font-size: 12px; margin-top: 8px;">သတင်းအသစ်များ ရောက်ရှိလာပါက ဤနေရာတွင် ပြသပါမည်</p>
          </div>
        `;
        return;
      }
      
      // Sort newest first
      notices.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      
      notices.forEach((notice, index) => {
        const dateStr = formatDate(notice.timestamp);
        const icon = getNoticeIcon(notice.type);
        
        const card = document.createElement("div");
        card.className = "notice-card";
        card.style.animationDelay = `${index * 0.05}s`;
        
        card.innerHTML = `
          <div class="notice-header">
            <div class="notice-icon">${icon}</div>
            <div class="notice-title">${notice.title || 'အသိပေးချက်'}</div>
            <div class="notice-date">📅 ${dateStr}</div>
          </div>
          <div class="notice-content">
            ${notice.message || notice.content || 'အကြောင်းအရာမရှိပါ'}
          </div>
          ${notice.badge ? `<div class="notice-badge">${notice.badge}</div>` : ''}
        `;
        
        noticeContainer.appendChild(card);
      });
    }, (error) => {
      console.error("Error loading notices:", error);
      noticeContainer.innerHTML = `
        <div class="empty-state">
          <div class="icon">⚠️</div>
          <p>ဒေတာများ ဖတ်ယူရာတွင် အမှားရှိသည်</p>
          <p style="font-size: 12px; margin-top: 8px;">${error.message}</p>
        </div>
      `;
    });
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loadNotices();
    } else {
      showToast("အကောင့်ဝင်ရန် လိုအပ်ပါသည်", true);
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    }
  });
</script>

</body>
</html>
